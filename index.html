    const mayaVigilance=[/ambitious/,/reputation/,/pragmatic/,/protective/,/stress/]
      .filter(rx=>rx.test(mayaPer)).length*5;
    const thiefSkill=thief.thieveryExp/100;
    const guardSecurity=Math.min(0.50, mayaExp*0.004 + mayaVigilance/100);
    // Town hall is institutionally well-secured (+0.20 hardness)
    const detectProb=Math.max(0.08,Math.min(0.97,
      (1-thiefSkill*0.75)*0.55 + guardSecurity + 0.20
    ));
    const detected=Math.random()<detectProb;

    if(!detected){
      // Loot: up to 12% of treasury, scales with thief skill
      const maxLoot=Math.min(this.s.treasury.balance*0.12, 250);
      const loot=Math.round(maxLoot*(0.4+thiefSkill*0.6)*(0.7+Math.random()*0.5));
      this.s.treasury.balance=Math.max(0,this.s.treasury.balance-loot);
      thief.cash+=Math.round(loot);
      thief.stolenCash=(thief.stolenCash||0)+Math.round(loot);
      thief.thieveryExp=Math.min(100,thief.thieveryExp+4); // hardest job = most growth
      thief.successfulSteals=(thief.successfulSteals||0)+1;
      thief._lastTarget=null;
      this._thiefCrimeImpact(thief,m,'treasury');
      thief.memory.push(`Day ${t.day}: Town hall ($${loot} of $${Math.round(this.s.treasury.balance+loot)} treasury). Maya's guard: ${Math.round(guardSecurity*100)}%.`);
      if(thief.memory.length>8)thief.memory.shift();
      this._news('warn','Treasury raided!',`$${loot} taken from town hall. Maya's security level: ${Math.round(guardSecurity*100)}%.`);
    }else{
      this._arrestThief(thief,t,`caught raiding town hall (Maya security ${Math.round((guardSecurity+0.20)*100)}%)`);
    }
  }

  // Fix 2: Crime index impact — every steal counts, streak multiplier, type weight
  _thiefCrimeImpact(thief, m, type){
    const steals=thief.successfulSteals||0;
    // Streak bonus: last 10 steals compound, max ×2.5
    const streakBonus=Math.min(2.5, 1.0 + (steals%10)*0.15);
    const typeWeight={treasury:5, building:3, resident:2}[type]||2;
    const crimeHit=Math.round(typeWeight*streakBonus);
    const repHit=Math.round(Math.ceil(typeWeight*streakBonus*0.5));
    m.crimeRate=Math.min(100, m.crimeRate+crimeHit);
    m.reputation=Math.max(0, m.reputation-repHit);
    // Milestone: every 5 steals, tourists notice and drop
    if(steals>0&&steals%5===0){
      m.tourists=Math.max(0,m.tourists-1);
      if(steals%10===0) // every 10 steals: headline
        this._news('warn','Crime surge',`${thief.name} has struck ${steals} times. Crime rate: ${m.crimeRate}%. Tourists deterred.`);
    }
  }

  // Daily fence: sell stolen goods back to shop inventory + fence cash stash
  _zackFenceLoot(){
    const inv=this.s.inv;
    this.a.filter(a=>a.isThief&&!a.detained).forEach(a=>{
      // Fence stolen goods — sold back into island inventory at 40–65%
      const goods=(a.stolenGoods||[]).slice();
      if(goods.length>0){
        const fenceRate=0.40+(a.thieveryExp/100)*0.25;
        let goodsEarned=0; const remaining=[];
        goods.forEach(g=>{
          if(Math.random()<0.6){ // fence 60% chance per item per day
            goodsEarned+=Math.round(g.qty*g.val*fenceRate);
            if(inv[g.type])inv[g.type].qty=(inv[g.type].qty||0)+Math.round(g.qty*0.7);
          }else remaining.push(g);
        });
        a.stolenGoods=remaining;
        if(goodsEarned>0){
          a.cash+=Math.round(goodsEarned);
          a.memory.push(`Day ${this.s.time.day}: Fenced stolen goods for $${goodsEarned}.`);
          if(a.memory.length>8)a.memory.shift();
        }
      }
      // Fence stolen cash stash (fence takes a cut of hot cash)
      const stash=a.stolenCash||0;
      if(stash>=15){
        const fenceCashRate=0.50+(a.thieveryExp/100)*0.20; // 50–70%
        const sellPortion=Math.min(stash,20+Math.floor(Math.random()*50));
        const fenceCut=Math.round(sellPortion*(1-fenceCashRate));
        a.stolenCash=Math.max(0,stash-sellPortion);
        a.cash=Math.max(0,a.cash-fenceCut);
        a.memory.push(`Day ${this.s.time.day}: Fenced $${sellPortion} stash at ${Math.round(fenceCashRate*100)}%, lost $${fenceCut} to fence.`);
        if(a.memory.length>8)a.memory.shift();
      }
    });
  }

  _arrestThief(thief, t, reason){
    thief.detained=true;
    thief.detainedDays=3+Math.floor(Math.random()*5);
    thief.detectedSteals=(thief.detectedSteals||0)+1;
    thief.criminalRecord=(thief.criminalRecord||0)+1;
    thief.socialCredit=Math.max(0,(thief.socialCredit||60)-40);
    thief.thieveryExp=Math.max(0,thief.thieveryExp-5);
    thief._lastTarget=null;

    // PENALTY: 50% ± 20% of cash confiscated (30–70% range)
    const penaltyRate=Math.max(0.30,Math.min(0.70, 0.50+(Math.random()-0.5)*0.40));
    const confiscateCash=Math.round(thief.cash*penaltyRate);
    const confiscateStash=thief.stolenCash||0;
    const confiscateGoodsVal=(thief.stolenGoods||[]).reduce((s,g)=>s+g.qty*g.val*0.5,0);
    thief.cash=Math.max(0,thief.cash-confiscateCash);
    thief.stolenCash=0;
    thief.stolenGoods=[]; // all stolen goods seized
    // ALL confiscated value goes to island treasury (less 5% police admin)
    const toTreasury=Math.round((confiscateCash+confiscateStash+confiscateGoodsVal)*0.95);
    this.s.treasury.balance+=Math.round(toTreasury);

    this.s.metrics.reputation=Math.max(0,this.s.metrics.reputation-4);
    this.s.metrics.crimeRate=Math.min(100,this.s.metrics.crimeRate+5);
    thief.state='detained';
    thief.destination={col:6,row:5};
    thief.path=bfsPath(thief.pos.col,thief.pos.row,6,5);
    thief.pathStep=0;

    const police=this.a.find(a=>a.role==='police');
    if(police){
      if(!police.experience)police.experience={};
      police.experience['police']=(police.experience['police']||0)+5;
      police.mood=Math.min(1,police.mood+0.1);
      police.memory.push(`Day ${t.day}: Arrested ${thief.name}. Confiscated $${confiscateCash} (${Math.round(penaltyRate*100)}%). ${reason}.`);
      if(police.memory.length>8)police.memory.shift();
    }
    this.s.bldg.police.arrests=(this.s.bldg.police.arrests||0)+1;
    thief.memory.push(`Day ${t.day}: ARRESTED — ${reason}. ${Math.round(penaltyRate*100)}% cash (−$${confiscateCash}) + all stash seized. ${thief.detainedDays}d.`);
    if(thief.memory.length>8)thief.memory.shift();
    this._news('warn',`${thief.name} arrested`,`${reason}. $${toTreasury} recovered to treasury. ${Math.round(penaltyRate*100)}% cash penalty.`);
  }

  // Police patrol — called each hourTick
  _policePpatrol(){
    const police=this.a.find(a=>a.role==='police'&&!a.detained);
    if(!police)return;
    const h=Math.floor(this.s.time.hour),t=this.s.time;

    // Police patrol roads at night and during work hours
    const isNight=h>=21||h<6;
    const isWork=this.s.time.dayOfWeek>=1&&this.s.time.dayOfWeek<=5&&h>=8&&h<17;
    if(!isNight&&!isWork)return;

    // Move to a random road cell (prefer near known thief locations)
    const thieves=this.a.filter(a=>a.isThief&&!a.detained);
    let patrolDest;
    if(thieves.length&&Math.random()<0.4){
      // Patrol toward known thief area with some noise
      const t0=thieves[Math.floor(Math.random()*thieves.length)];
      const nearby=ROAD_CELLS.filter(rc=>
        Math.abs(rc.col-t0.pos.col)+Math.abs(rc.row-t0.pos.row)<=2);
      patrolDest=nearby.length?nearby[Math.floor(Math.random()*nearby.length)]:null;
    }
    if(!patrolDest){
      patrolDest=ROAD_CELLS[Math.floor(Math.random()*ROAD_CELLS.length)];
    }
    if(police.destination?.col!==patrolDest.col||police.destination?.row!==patrolDest.row){
      police.state='patrolling';
      police.destination=patrolDest;
      police.path=bfsPath(police.pos.col,police.pos.row,patrolDest.col,patrolDest.row);
      police.pathStep=0;
    }

    // Check for thieves on same or adjacent tile
    const policeExp=(police.experience?.police||0);
    thieves.forEach(thief=>{
      if(thief.detained)return;
      const dist=Math.abs(police.pos.col-thief.pos.col)+Math.abs(police.pos.row-thief.pos.row);
      if(dist>1)return;
      // Detection probability: police experience vs thief stealth
      // Police exp 0 → 30% base. Thief exp 100 → almost invisible.
      const policeSkill=0.30+Math.min(0.50,policeExp/100*0.50);
      const thiefStealth=thief.thieveryExp/100*0.70;
      const detectChance=Math.max(0.05,policeSkill-thiefStealth);
      if(Math.random()<detectChance){
        this._arrestThief(thief,t,`caught on patrol at (${thief.pos.col},${thief.pos.row})`);
      }
    });
  }

  // Church redemption — called during Sunday church service
  _churchRedemption(){
    const t=this.s.time;
    // All thieves/ex-cons at church get a redemption roll
    this.a.filter(a=>(a.isThief||a.criminalRecord>0)&&!a.detained&&MAP[a.pos.row]?.[a.pos.col]==='church')
    .forEach(a=>{
      const faithBonus=this.s.prayer/100*0.3; // prayer score helps
      const baseChance=0.15+faithBonus;
      if(Math.random()<baseChance){
        const creditGain=15+Math.floor(Math.random()*20);
        a.socialCredit=Math.min(100,(a.socialCredit||60)+creditGain);
        a.mood=Math.min(1,a.mood+0.2);
        if(a.isThief&&a.socialCredit>=40){
          a.isThief=false;
          a.memory.push(`Day ${t.day}: Found redemption at church. Credit restored to ${a.socialCredit}. Leaving crime behind.`);
          if(a.memory.length>8)a.memory.shift();
          this._news('good',`${a.name} redeemed`,`Church absolution. Credit +${creditGain}. Reformed.`);
          // Give them a fresh start — try to find private work
          const openPrivate=Object.entries(CAREERS).find(([k,c])=>!c.public&&c.sal>0&&!this.a.some(x=>x.id!==a.id&&x.role===k));
          if(openPrivate){
            a.role=openPrivate[0]; a.wp=openPrivate[1].wp; a.sal=openPrivate[1].sal;
          }
        } else if(a.criminalRecord>0){
          a.memory.push(`Day ${t.day}: Church forgiveness. Credit +${creditGain}.`);
          if(a.memory.length>8)a.memory.shift();
          this._news('good',`${a.name} forgiven`,`Credit +${creditGain} through church.`);
        }
      }
    });
    // Detained agents: church visit from Father Jo reduces sentence
    const fatherJo=this.a.find(a=>a.id==='fatherjo');
    if(fatherJo&&MAP[fatherJo.pos.row]?.[fatherJo.pos.col]==='church'){
      this.a.filter(a=>a.detained).forEach(a=>{
        if(Math.random()<0.25){
          a.detainedDays=Math.max(0,a.detainedDays-2);
          a.memory.push(`Day ${t.day}: Father Jo visited. Sentence reduced.`);
          if(a.memory.length>8)a.memory.shift();
        }
      });
    }
  }

  _news(type,title,body){
    const t=this.s.time;
    const e={type,title,body,day:t.day,time:`${String(Math.floor(t.hour)).padStart(2,'0')}:${String(Math.floor(t.minute)).padStart(2,'0')}`};
    this.s.log.unshift(e); if(this.s.log.length>40)this.s.log.pop();
    this.emit('news',e);
  }
  _ledger(label,amount,type){
    this.s.ledger.unshift({label,amount:Math.round(amount),type,time:String(Math.floor(this.s.time.hour)).padStart(2,'0')+':'+String(Math.floor(this.s.time.minute)).padStart(2,'0')});
    if(this.s.ledger.length>20)this.s.ledger.pop();
    this.emit('ledger',this.s.ledger[0]);
  }
  on(ev,fn){(this._ev[ev]||(this._ev[ev]=[])).push(fn);}
  emit(ev,d){(this._ev[ev]||[]).forEach(fn=>fn(d));}
}

// ── PHASER SCENE ─────────────────────────────────────────────
class GameScene extends Phaser.Scene{
  constructor(){super({key:'GameScene'});}

  create(){
    const GAP=4;
    const MW=W-LP-RP, MH=H-TH-BH;
    const CS=Math.floor(Math.min(MW,MH)/8)-GAP;
    this.CS=CS; this.GAP=GAP;
    this.GW=(CS+GAP)*8-GAP; this.GH=(CS+GAP)*8-GAP;
    this.GX=LP+Math.floor((MW-this.GW)/2);
    this.GY=TH+Math.floor((MH-this.GH)/2);
    // At 1× speed: 1 real-sec = 4 sim-min. A road cell ≈ 5 sim-min walk.
    // Tween 400ms keeps movement visually smooth at all speeds.
    this.STEP_MS=400;

    this.add.rectangle(0,0,W,H,0x0d0f18).setOrigin(0,0);
    this.add.rectangle(LP,TH,MW,MH,0x0e1220).setOrigin(0,0);

    // ── Draw map ──────────────────────────────────────────────
    const drawn=new Set();
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const k=`${c},${r}`;
        if(drawn.has(k))continue;
        const ct=MAP[r][c];
        const x=this.GX+c*(CS+GAP), y=this.GY+r*(CS+GAP);
        const nonSingle=ct!=='road'&&ct!=='house'&&ct!=='dock';
        const merge=nonSingle&&c+1<COLS&&MAP[r][c+1]===ct;
        const cw=merge?(CS+GAP)+CS:CS;
        if(merge)drawn.add(`${c+1},${r}`);
        const g=this.add.graphics();
        g.fillStyle(CFILL[ct]||0x1a1d2a,1);
        g.lineStyle(2,CBORD[ct]||0xfbbf24,1);
        g.fillRoundedRect(x,y,cw,CS,4);
        g.strokeRoundedRect(x,y,cw,CS,4);
        const lbl=CLBL[ct];
        if(lbl){
          const hasSub=this._houseLabel(c,r)!==null;
          const fs=merge?Math.max(12,Math.floor(CS*.17)):Math.max(9,Math.floor(CS*.115));
          this.add.text(x+cw/2,y+CS/2-(hasSub?7:0),lbl,{
            fontFamily:'IBM Plex Mono,monospace',fontSize:fs+'px',fontStyle:'bold',
            color:'#fff',stroke:'#000000aa',strokeThickness:3,
            align:'center',wordWrap:{width:cw-8},resolution:2
          }).setOrigin(.5).setDepth(2);
        }
        // Road tiles: clicking deselects current agent
        if(ct==='road'){
          const rect=this.add.rectangle(x+CS/2,y+CS/2,CS,CS,0,0).setDepth(3).setInteractive();
          rect.on('pointerdown',()=>this._deselectAgent());
        }
        // House occupant label
        const hl=this._houseLabel(c,r);
        if(hl){
          this.add.text(x+cw/2,y+CS/2+9,hl,{
            fontFamily:'IBM Plex Mono,monospace',
            fontSize:Math.max(7,Math.floor(CS*.075))+'px',
            color:'#ffffffcc',align:'center',wordWrap:{width:cw-6},resolution:2
          }).setOrigin(.5).setDepth(2);
        }
      }
    }

    this.state=JSON.parse(JSON.stringify(INIT));
    this.agents=JSON.parse(JSON.stringify(AGENTS));
    this.dots={};
    this.pathGfx=this.add.graphics().setDepth(6);
    this.selAgent=null;
    // 4) heartbeat timer per agent (staggered)
    this.hbTimers={};

    this.agents.forEach((a,i)=>{
      const {x,y}=this._cc(a.pos.col,a.pos.row);
      a.pixelX=x; a.pixelY=y;
      this._mkDot(a,i);
    });

    this.engine=new WorldEngine(this.state,this.agents);
    this.engine.on('update',({s,a})=>{this._hudUpdate(s,a);});
    this.engine.on('news',  e=>this._hudNews(e));
    this.engine.on('ledger',e=>this._hudLedger(e));
    this.engine.on('career',e=>this._hudCareer(e));
    this.engine.on('prices',e=>this._hudPrices(e));
    this.engine.on('futures',f=>this._hudFutures(f));
    this.engine.on('weekly', w=>this._hudWeekly(w));
    this.engine.on('taxChange',e=>this._hudTaxChip(e));
    this.engine.on('gameover',d=>this._gameOver(d));

    this.input.keyboard.on('keydown-SPACE',()=>{this.state.time.simSpeed=this.state.time.simSpeed?0:1;this._spdBtns(this.state.time.simSpeed);});
    [[1,'ONE'],[2,'TWO'],[4,'FOUR']].forEach(([s,k])=>this.input.keyboard.on('keydown-'+k,()=>{this.state.time.simSpeed=s;this._spdBtns(s);}));
    window._setSpd=s=>{this.state.time.simSpeed=s;this._spdBtns(s);};
    window._marry=(aid,bid)=>this._doMarriage(aid,bid);

    this._buildHUD();
    this._sizeHUD();
    checkOllama();
    setInterval(checkOllama, 15000); // re-check every 15s

    // 4) Start heartbeat loop for all agents (staggered by index)
    this.agents.forEach((a,i)=>{
      this.time.delayedCall(i*300,()=>this._startHeartbeat(a));
    });
  }

  _houseLabel(col,row){
    // Find which house occupies this cell
    for(const h of Object.values(HOUSES)){
      if(h.col===col&&h.row===row)return h.label;
    }
    return null;
  }

  _mkDot(agent,idx){
    const {x,y}=this._cc(agent.pos.col,agent.pos.row);
    const R=Math.max(11,Math.floor(this.CS*.15));
    const c=agent.col||0xffffff;
    const glow=this.add.circle(x,y,R+4,c,0.14).setDepth(3);
    const dot= this.add.circle(x,y,R,c,1).setDepth(4).setInteractive();
    const init=this.add.text(x,y,agent.ini,{
      fontFamily:'IBM Plex Mono,monospace',fontSize:Math.max(7,Math.floor(R*.76))+'px',
      fontStyle:'bold',color:'#fff',stroke:'#000',strokeThickness:2,resolution:2
    }).setOrigin(.5).setDepth(6);
    const lbl=this.add.text(x,y-R-6,agent.name,{
      fontFamily:'IBM Plex Mono,monospace',fontSize:'12px',fontStyle:'bold',
      color:'#ffffff',stroke:'#000000',strokeThickness:3,
      backgroundColor:'#00000075',padding:{x:3,y:2},resolution:2
    }).setOrigin(.5,1).setDepth(7);
    // Selection ring — drawn as a Graphics circle, hidden until selected
    const ring=this.add.graphics().setDepth(8);
    ring.setVisible(false);

    dot.on('pointerdown',()=>this._selAgentById(agent.id));
    dot.on('pointerover',()=>{dot.setScale(1.25);this._hlAgent(agent.id);});
    dot.on('pointerout', ()=>dot.setScale(1));
    this.dots[agent.id]={dot,glow,init,lbl,ring,tweening:false,hbActive:false,idx};
  }

  // 4) Universal slow heartbeat: bob 10px up then back, every 5s
  _startHeartbeat(agent){
    const o=this.dots[agent.id];if(!o)return;
    const doHB=()=>{
      if(o.tweening)return;
      const base=this._cc(agent.pos.col,agent.pos.row);
      const off=this._overlapOffset(agent);
      const bx=base.x+off, by=base.y;
      const R=Math.max(11,Math.floor(this.CS*.15));
      // Bob up then back; update ring on each frame if selected
      this.tweens.chain({
        targets:[o.dot,o.glow,o.init],
        tweens:[
          {y:by-10,duration:300,ease:'Sine.easeOut',
            onUpdate:()=>{ if(this.selAgent===agent.id&&o.ring.visible){o.ring.clear();o.ring.lineStyle(3,0xffffff,1);o.ring.strokeCircle(bx,o.dot.y,R+4);} }},
          {y:by,   duration:300,ease:'Sine.easeIn',
            onUpdate:()=>{ if(this.selAgent===agent.id&&o.ring.visible){o.ring.clear();o.ring.lineStyle(3,0xffffff,1);o.ring.strokeCircle(bx,o.dot.y,R+4);} }},
        ]
      });
      this.tweens.add({targets:o.lbl,y:by-R-16,duration:300,ease:'Sine.easeOut',yoyo:true});
    };
    const loop=()=>{doHB();this.time.delayedCall(5000,loop);};
    loop();
  }

  // 3) Overlap offset: agents sharing a cell spread LEFT→RIGHT by 15px each
  _overlapOffset(agent){
    const same=this.agents.filter(a=>a.pos.col===agent.pos.col&&a.pos.row===agent.pos.row);
    if(same.length<=1)return 0;
    const idx=same.indexOf(agent);
    const total=same.length;
    // centre the group
    return (idx-(total-1)/2)*15;
  }

  _advanceAgentWalk(agent){
    const o=this.dots[agent.id];if(!o||o.tweening)return;
    if(!agent.path||agent.path.length===0||agent.pathStep>=agent.path.length)return;
    const next=agent.path[agent.pathStep];if(!next)return;
    o.tweening=true;
    const spd=Math.max(1,this.state.time.simSpeed);
    const dur=Math.max(60,Math.floor(this.STEP_MS/spd));
    const base=this._cc(next.col,next.row);
    const R=Math.max(11,Math.floor(this.CS*.15));
    // will recalc offset after moving
    const tx=base.x,ty=base.y;
    this.tweens.add({
      targets:[o.dot,o.glow,o.init],x:tx,y:ty,duration:dur,ease:'Linear',
      onComplete:()=>{
        o.tweening=false;
        // apply correct offset after arrival
        const off=this._overlapOffset(agent);
        if(off!==0){
          this.tweens.add({targets:[o.dot,o.glow,o.init],x:tx+off,duration:120,ease:'Power2'});
          this.tweens.add({targets:o.lbl,x:tx+off,duration:120,ease:'Power2'});
        }
        // Redraw ring at new position if this agent is selected
        if(this.selAgent===agent.id){
          const R2=Math.max(11,Math.floor(this.CS*.15));
          const finalOff=this._overlapOffset(agent);
          o.ring.clear();
          o.ring.lineStyle(3,0xffffff,1);
          o.ring.strokeCircle(tx+finalOff,ty,R2+4);
        }
      }
    });
    this.tweens.add({targets:o.lbl, x:tx,y:ty-R-6,duration:dur,ease:'Linear'});
    agent.pos.col=next.col; agent.pos.row=next.row; agent.pathStep++;
    // 8) fuel burn per step (0.05L per square)
    const inv=this.state.inv;
    if(inv.fuel.qty>0){inv.fuel.qty=Math.max(0,inv.fuel.qty-.05);}
    agent.fuelUsedToday+=.05;
    // Update glow colour by state — thieves red, detained orange, normal states as before
    const gc=agent.detained?0xf97316:agent.isThief&&agent.state==='stealing'?0xdc2626:agent.state==='working'?0x22c55e:agent.state==='church'?0xfcd34d:agent.state==='sleeping'?0x1e3a8a:agent.state==='hospital'?0xef4444:agent.state==='patrolling'?0x6366f1:agent.col;
    o.glow.setFillStyle(gc,.22);
    // Thieves pulse brighter at night
    if(agent.isThief&&!agent.detained){
      const h=Math.floor(this.state.time.hour);
      const isNight=h>=21||h<5;
      if(isNight)o.glow.setFillStyle(gc,.45);
    }
  }

  _deselectAgent(){
    if(!this.selAgent)return;
    const prev=this.dots[this.selAgent];
    if(prev){prev.ring.setVisible(false);prev.glow.setAlpha(0);}
    this.selAgent=null;
    document.querySelectorAll('.ar').forEach(e=>e.classList.remove('sel'));
    const panel=document.getElementById('ad');
    if(panel){panel.className='';panel.innerHTML='';}
  }

  _selAgentById(id){
    this.pathGfx.clear();
    document.querySelectorAll('.ar').forEach(e=>e.classList.remove('sel'));
    const el=document.getElementById('ar-'+id);if(el){el.classList.add('sel');el.scrollIntoView({block:'nearest'});}
    // Hide ring on previously selected
    if(this.selAgent&&this.selAgent!==id){
      const prev=this.dots[this.selAgent];
      if(prev){prev.ring.setVisible(false);prev.glow.setAlpha(.14);}
    }
    this.selAgent=id;
    const a=this.agents.find(x=>x.id===id);if(!a)return;
    // Draw bright white ring on selected dot
    const o=this.dots[id];
    if(o){
      const R=Math.max(11,Math.floor(this.CS*.15));
      const {x,y}=this._cc(a.pos.col,a.pos.row);
      const off=this._overlapOffset(a);
      o.ring.clear();
      o.ring.lineStyle(3,0xffffff,1);
      o.ring.strokeCircle(x+off,y,R+4);
      o.ring.setVisible(true);
      o.glow.setAlpha(.5);
    }
    if(a.path&&a.path.length>0){
      this.pathGfx.lineStyle(2,a.col||0xffffff,.4);
      this.pathGfx.beginPath();
      const {x:sx,y:sy}=this._cc(a.pos.col,a.pos.row);
      this.pathGfx.moveTo(sx,sy);
      a.path.slice(a.pathStep).forEach(st=>{const {x,y}=this._cc(st.col,st.row);this.pathGfx.lineTo(x,y);});
      this.pathGfx.strokePath();
    }
    this._showAgentDetail(a);
    // Queue LLM thought — panel refreshes when thought arrives
    if(ollamaOnline){
      const worldCtx=`Day ${this.state.time.day}, treasury $${Math.round(this.state.treasury.balance)}, morale ${this.state.metrics.morale}`;
      queueThink(a,worldCtx,()=>{if(this.selAgent===a.id)this._showAgentDetail(a);});
    }
  }
  _doMarriage(aid,bid){
    const a=this.agents.find(x=>x.id===aid);
    const b=this.agents.find(x=>x.id===bid);
    if(!a||!b||!canMarry(a,b))return;
    // Marry
    a.sp=bid; b.sp=aid;
    // Move into one house (use A's house, release B's)
    const ha=HOUSES[a.houseId];
    const hb=HOUSES[b.houseId];
    if(ha&&hb&&ha!==hb){
      // B moves into A's house
      if(!ha.residents.includes(bid))ha.residents.push(bid);
      hb.residents=hb.residents.filter(id=>id!==bid);
      hb.rentPerWeek=30; // B's old house now for rent
      b.houseCell={col:ha.col,row:ha.row};
      b.houseId=a.houseId;
      AGENT_HOUSE[bid]=a.houseId;
      ha.label=`${a.name} & ${b.name}`;
    }
    this._news('good',`${a.name} & ${b.name} married!`,`They now share a house. Morale boost.`);
    a.mood=Math.min(1,a.mood+.25);
    b.mood=Math.min(1,b.mood+.25);
    this._showAgentDetail(a); // refresh detail panel
  }

  // 5) Rich agent detail panel ─────────────────────────────────
  _showAgentDetail(a){
    const panel=document.getElementById('ad');if(!panel)return;
    const spouse=a.sp?this.agents.find(x=>x.id===a.sp)?.name:'—';
    const hp=Math.round(a.health*100), mn=Math.round(((a.mood+1)/2)*100);
    const hc=hp>60?'#4ade80':hp>30?'#fbbf24':'#f87171';
    const mc=mn>60?'#4ade80':mn>30?'#fbbf24':'#f87171';
    const house=HOUSES[a.houseId];
    const locT=MAP[a.pos.row]?.[a.pos.col]||'?';
    const destT=a.destination?MAP[a.destination.row]?.[a.destination.col]||'?':'—';
    const steps=(a.path?.length||0)-(a.pathStep||0);
    const housemates=house?house.residents.filter(id=>id!==a.id).map(id=>this.agents.find(x=>x.id===id)?.name||id).join(', '):'alone';

    // Marriage candidates
    const candidates=this.agents.filter(b=>canMarry(a,b)&&b.mood>.3);
    const marriageHTML=a.sp?'':(candidates.length>0
      ?`<div style="margin-top:0.56vh"><span class="adl">Propose to</span><div style="display:flex;gap:0.31vw;flex-wrap:wrap;margin-top:0.42vh">${candidates.slice(0,4).map(b=>`<button class="mpbtn" onclick="window._marry('${a.id}','${b.id}')">${b.name}</button>`).join('')}</div></div>`
      :'');

    // Mayor-only: show auto-trade log (read-only, AI-driven)
    const tradeHTML = a.id==='maya' ? (()=>{
      const log=this._tradeLog||[];
      const entries=log.length
        ? log.slice(0,5).map(e=>`<div class="trade-entry">${e}</div>`).join('')

  // ── AUTO-TRADE ENGINE (Maya, personality-driven) ─────────────
  // Called from engine hourTick via scene bridge every few sim-hours.
  _mayaAutoTrade(){
    const maya=this.agents.find(a=>a.id==='maya');
    if(!maya)return;
    if(!this.state.bldg.airport.open)return;
    if(this.state.supply.status==='blocked')return;

    // Change 1: trading only on working days/hours (Mon–Fri 08:00–17:00)
    const t=this.state.time;
    const h=Math.floor(t.hour), dow=t.dayOfWeek;
    const isWorkTime=dow>=1&&dow<=5&&h>=8&&h<17;
    if(!isWorkTime)return;

    const inv=this.state.inv;
    const tr =this.state.treasury;
    // Change 3: FEE now depends on reputation (social credit)
    // High reputation → lower fee (trusted trader). Low → penalty.
    const rep=this.state.metrics.reputation;
    const FEE=Math.max(0.01, Math.min(0.15, 0.08-(rep-50)*0.001));
    const iq =Math.round(65+maya.mood*15+(rep-50)*0.2);
    if(Math.random()*100>iq)return;

    const lbl={food:'Food',medicine:'Medicine',fuel:'Fuel',rawMat:'RawMat',
               goods:'Goods',fish:'Fish',minerals:'Minerals',alcohol:'Alcohol',treasury:'Cash'};

    const consumables=[
      {k:'food',    use:17, pri:10, val:inv.food?.buy||3},
      {k:'medicine',use:2,  pri:8,  val:inv.medicine?.buy||12},
      {k:'fuel',    use:5,  pri:5,  val:inv.fuel?.buy||6},
      {k:'rawMat',  use:20, pri:4,  val:inv.rawMat?.buy||10},
    ];
    const exports=[
      {k:'goods',    val:inv.goods?.exportPrice||45},
      {k:'fish',     val:inv.fish?.exportPrice||18},
      {k:'minerals', val:inv.minerals?.exportPrice||28},
      {k:'alcohol',  val:inv.alcohol?.sell||14},
    ];

    // Find most urgent shortage
    const urgent=consumables
      .map(i=>({...i,days:Math.floor((inv[i.k]?.qty||0)/i.use)}))
      .filter(i=>i.days<3)
      .sort((a,b)=>b.pri-a.pri)[0];

    const cashUrgent=tr.balance<200;
    let mode=null,sellKey=null,buyKey=null,sellQty=0,receiveQty=0,gross=0;

    // Change 2: ONLY cash→goods OR goods→cash. No goods→goods.

    if(urgent&&tr.balance>=150){
      // Mode A: cash → goods (buy urgent consumable with treasury)
      mode='cash→goods';
      sellKey='treasury'; buyKey=urgent.k;
      const bv=inv[urgent.k]?.buy||1;
      const targetBuy=urgent.use*3;
      const spend=Math.min(targetBuy*bv*(1+FEE), tr.balance*0.35);
      receiveQty=Math.floor(spend/((1+FEE)*bv));
      gross=receiveQty*bv;
      if(receiveQty>0){
        tr.balance-=gross*(1+FEE);
        inv[buyKey].qty=(inv[buyKey].qty||0)+receiveQty;
      }else mode=null;
    }

    if(!mode){
      // Mode B: goods → cash (sell export surplus)
      const sellable=exports
        .filter(s=>(inv[s.k]?.qty||0)>8)
        .sort((a,b)=>b.val-a.val)[0];
      if(sellable&&(cashUrgent||!urgent&&Math.random()<0.2)){
        mode='goods→cash';
        sellKey=sellable.k; buyKey='treasury';
        sellQty=Math.min(Math.floor((inv[sellKey]?.qty||0)*0.35), 25);
        gross=sellQty*sellable.val;
        const revenue=gross*(1-FEE);
        receiveQty=Math.round(revenue);
        if(sellQty>0){
          inv[sellKey].qty=Math.max(0,(inv[sellKey].qty||0)-sellQty);
          tr.balance+=revenue;
        }else mode=null;
      }
    }

    if(!mode)return;

    const sellLbl=lbl[sellKey]||sellKey;
    const buyLbl =lbl[buyKey]||buyKey;
    const sellStr=mode==='goods→cash'?`${sellQty} ${sellLbl}`:`$${Math.round(gross*(1+FEE))}`;
    const buyStr =mode==='goods→cash'?`$${receiveQty}`:`${receiveQty} ${buyLbl}`;
    const feeAmt =mode==='goods→cash'?Math.round(gross*FEE):Math.round(gross*FEE);
    const logLine=`<span class="tok">Day${t.day}·IQ${iq}</span> [${mode}] ${sellStr}→<span class="tok">${buyStr}</span> fee$${feeAmt} rep${rep}`;
    if(!this._tradeLog)this._tradeLog=[];
    this._tradeLog.unshift(logLine);
    if(this._tradeLog.length>10)this._tradeLog.pop();
    this.engine._ledger(`Maya: ${mode} ${sellStr}→${buyStr}`,-feeAmt,'spend');
    // Trade logged only to Maya's trade panel (not world news — keeps news clean)
    maya.memory.push(`Day ${t.day}: ${mode} — ${sellStr}→${buyStr}.`);
    if(maya.memory.length>6)maya.memory.shift();
  }

  // ── NEWS FADE: dim entries older than N sim-days ──────────────
  _fadeStaleNews(){
    const list=document.getElementById('nl');if(!list)return;
    const now=this.state.time.day;
    Array.from(list.children).forEach((el,i)=>{
      // i=0 is newest. Fade by age: index acts as proxy since news is insertion-ordered.
      // Also store data-day on insertion for precise fading.
      const entryDay=parseInt(el.dataset.day||now);
      const age=now-entryDay; // sim-days old
      let opacity=1;
      if(age>=4)     opacity=0.18;
      else if(age>=3)opacity=0.35;
      else if(age>=2)opacity=0.55;
      else if(age>=1)opacity=0.75;
      el.style.opacity=opacity;
    });
  }

  _cc(col,row){return{x:this.GX+col*(this.CS+this.GAP)+this.CS/2,y:this.GY+row*(this.CS+this.GAP)+this.CS/2};}

  _gameOver({reason,day}){
    this.add.rectangle(W/2,H/2,W,H,0,0.88).setDepth(20);

    this.add.text(W/2,H/2+5,reason==='deficit'?'Treasury deficit >50%\nDay '+day:'Population collapsed\nDay '+day,{fontFamily:'IBM Plex Mono',fontSize:'14px',color:'#fecaca',align:'center',resolution:2}).setOrigin(.5).setDepth(21);
    this.add.text(W/2,H/2+58,'Score: '+Math.round(day*this.state.metrics.happiness/100),{fontFamily:'IBM Plex Mono',fontSize:'22px',fontStyle:'bold',color:'#a78bfa',resolution:2}).setOrigin(.5).setDepth(21);
    this.state.time.simSpeed=0;
  }

  update(_t,dt){
    if(this.engine&&this.state.time.simSpeed>0)this.engine.tick(dt,this.state.time.simSpeed);
    this.agents.forEach(a=>this._advanceAgentWalk(a));
    // Maya auto-trade
    if(Math.random()<0.0005*this.state.time.simSpeed)this._mayaAutoTrade();
    // Refresh selected agent detail
    if(this.selAgent&&Math.random()<.003){const a=this.agents.find(x=>x.id===this.selAgent);if(a)this._showAgentDetail(a);}
    // Background Ollama thinking — each agent gets a thought roughly every 2 sim-hours
    // Probability tuned so ~1 agent/minute at 1× speed. Queue handles concurrency.
    if(ollamaOnline&&Math.random()<0.0003*this.state.time.simSpeed){
      const a=this.agents[Math.floor(Math.random()*this.agents.length)];
      if(a&&!a.bankrupt){
        const worldCtx=`Day ${this.state.time.day}, treasury $${Math.round(this.state.treasury.balance)}, morale ${this.state.metrics.morale}`;
        queueThink(a,worldCtx,()=>{if(this.selAgent===a.id)this._showAgentDetail(a);});
      }
    }
    if(Math.random()<0.01)this._fadeStaleNews();
  }

    // Treasury

  _buildInv(s){
    const g=document.getElementById('invg');if(!g)return;
    const inv=s.inv;
    const items=[
      {k:'food',     l:'Food',     d:17, priceKey:'buy'},
      {k:'medicine', l:'Medicine', d:2,  priceKey:'buy'},
      {k:'fuel',     l:'Fuel',     d:10, priceKey:'buy'},
      {k:'rawMat',   l:'Materials',d:20, priceKey:'buy'},
      {k:'goods',    l:'Goods',    d:0,  priceKey:'exportPrice'},
      {k:'alcohol',  l:'Alcohol',  d:1,  priceKey:'sell'},
      {k:'fish',     l:'Fish',     d:0,  priceKey:'exportPrice'},
      {k:'minerals', l:'Minerals', d:0,  priceKey:'exportPrice'},
    ];
    g.innerHTML=items.map(it=>{
      const item=inv[it.k]||{};
      const qty=Math.round(item.qty||0);
      const days=it.d>0?Math.floor(qty/it.d):99;
      const cl=days<=2?'crit':days<=5?'warn':'ok';
      const price=item[it.priceKey]||0;
      const nomKey=it.priceKey==='exportPrice'?'nominalExport':it.priceKey==='buy'?'nominalBuy':'nominalSell';
      const nomPrice=item[nomKey]||price;
      const priceCol=price>nomPrice*1.1?'#f87171':price<nomPrice*0.9?'#4ade80':'#94a3b8';
      const priceLabel=it.priceKey==='exportPrice'?'exp':'buy';
      return`<div class="ii">
        <span class="in">${it.l}</span>
        <div style="text-align:right">
          <div class="iq ${cl}">${qty}u</div>
          <div class="id" style="color:${priceCol}">$${price} ${priceLabel}${days>0&&days<99?' · '+days+'d':''}</div>
        </div>
      </div>`;
    }).join('');
  }

  _hudNews(e){

    el.innerHTML=`<div class="ni2">${im[e.type]||'i'}</div><div class="nb"><div class="nti">${e.title}</div><div class="nsb">${e.body}</div></div><div class="ntm">Day ${e.day||this.state.time.day} · ${e.time}</div>`;

      const el=document.createElement('div');
      const isMayor=e.type==='mayor';
      el.className='nt '+(isMayor?(e.snap?'nw2':'ng2'):'nif');
      el.dataset.day=e.day||this.state.time.day;
      const icon=isMayor?(e.snap?'!':'★'):'⇄';
      let body='';
      if(isMayor){
        body=`<div class="nti">${e.snap?'Snap vote':'Mayor elected'}: ${e.winner}</div>`;
      } else {
        const lines=(e.results||[]).map(r=>`<div class="nsb">${r}</div>`).join('');
        body=`<div class="nti">Term ${e.term} career changes</div>${lines||'<div class="nsb">No changes this term.</div>'}`;
      }
      el.innerHTML=`<div class="ni2">${icon}</div><div class="nb">${body}</div><div class="ntm">Day ${e.day}</div>`;
      list.insertBefore(el,list.firstChild);
      while(list.children.length>6)list.removeChild(list.lastChild);
      const term=e.term||Math.floor((e.day||this.state.time.day)/30)+1;
      const sh=document.getElementById('career-term');
      if(sh)sh.textContent=`Term ${term} · Next Day ${Math.ceil(term*30)}`;
    }

    // Refresh occupation badges (occ-) not rl- which contains cash span
    this.agents.forEach(a=>{
      const oc=document.getElementById('occ-'+a.id);
      if(oc)oc.textContent=a.role.replace(/_/g,' ');
    });
  }

  _hudPrices(e){
    // Update dock price index display
    const dock=document.getElementById('dock-idx');
    if(dock){
      const col=e.dock<0.8?'#4ade80':e.dock>1.3?'#f87171':'#fbbf24';
      const label=e.dock<0.8?'↓ surplus':e.dock>1.3?'↑ scarce':'nominal';
      dock.innerHTML=`<span style="color:${col}">${e.dock.toFixed(2)}× ${label}</span>`;
    }
    // Update airport price index + flight cost
    const air=document.getElementById('airport-idx');
    if(air){
      const col=e.airport<1.0?'#4ade80':e.airport>1.5?'#f87171':'#fbbf24';
      air.innerHTML=`<span style="color:${col}">${e.airport.toFixed(2)}× buy · $${e.flightCost}/flight</span>`;
    }
    // Also update inventory display to show live prices
    const inv=this.state.inv;
    ['goods','fish','minerals'].forEach(k=>{
      const el=document.getElementById('exprice-'+k);
      if(el&&inv[k])el.textContent='$'+inv[k].exportPrice+'/u';
    });
    ['food','medicine','fuel','rawMat'].forEach(k=>{
      const el=document.getElementById('bprice-'+k);
      if(el&&inv[k])el.textContent='$'+inv[k].buy+'/u';
    });
  }

  _hudFutures(f){
    const val=document.getElementById('fi-val');
    const chg=document.getElementById('fi-chg');
    if(!val||!chg)return;
    val.textContent=Math.round(f.value).toLocaleString();
    const up=f.changePct>=0;
    chg.textContent=(up?'▲':'▼')+Math.abs(f.changePct).toFixed(2)+'%';
    chg.className='fi-chg '+(up?'up':'dn');
    // Update fi-chip border colour
    const chip=document.getElementById('fi-chip');
    if(chip)chip.style.borderColor=up?'#166534':'#7f1d1d';
  }

  _hudWeekly(w){
    if(!w)return;
    const modal=document.getElementById('weekly-modal');
    const body=document.getElementById('wm-body');
    const wk=document.getElementById('wm-week');
    if(!modal||!body||!wk)return;
    wk.textContent=w.week;
    const row=(k,v,cls='')=>`<div class="wm-row"><span class="wm-k">${k}</span><span class="wm-v ${cls}">${v}</span></div>`;
    const trend=(v,good,bad)=>v>=good?'wm-good':v<=bad?'wm-bad':'wm-neu';
    body.innerHTML=`
      <div class="wm-sec">📈 Economy</div>
      ${row('Economy',w.economy+'%',trend(w.economy,65,40))}
      ${row('Treasury','$'+w.balance.toLocaleString(),w.balance>500?'wm-good':w.balance<0?'wm-bad':'wm-neu')}
      ${row('Deficit',w.deficit+'%',w.deficit<10?'wm-good':w.deficit>35?'wm-bad':'wm-neu')}
      ${row('Tax rate',w.taxRate+'%','')}
      ${row('Futures Index',w.futuresVal+(w.futuresPct>=0?' ▲':' ▼')+Math.abs(w.futuresPct)+'%',w.futuresPct>=0?'wm-good':'wm-bad')}
      <div class="wm-sec">👥 Community</div>
      ${row('Morale',w.morale+'%',trend(w.morale,65,40))}
      ${row('Happiness',w.happiness+'%',trend(w.happiness,65,40))}
      ${row('Reputation',w.reputation+'%',trend(w.reputation,65,40))}
      ${row('Crime rate',w.crime+'%',w.crime<15?'wm-good':w.crime>40?'wm-bad':'wm-neu')}
      ${row('Tourists/day',w.tourists,w.tourists>5?'wm-good':w.tourists===0?'wm-bad':'wm-neu')}
      ${row('Employed',w.employed+' of '+this.agents.length,'')}
      ${row('Bankrupt',w.bankrupt,w.bankrupt===0?'wm-good':w.bankrupt>2?'wm-bad':'wm-neu')}
      <div class="wm-sec">🏛 Government</div>
      ${row('Mayor',w.mayor,'')}
      ${row('Active crises',w.crises,w.crises==='none'?'wm-good':'wm-bad')}
    `;
    modal.className='vis';
    // Auto-hide after 12 seconds
    clearTimeout(this._weeklyTimer);
    this._weeklyTimer=setTimeout(()=>{if(modal)modal.className='';},12000);
  }

  _hudTaxChip({rate}){
    const chip=document.getElementById('tax-chip');
    const val=document.getElementById('tax-val');
    if(chip)chip.textContent=`Tax ${Math.round(rate*100)}%`;
    if(val)val.textContent=Math.round(rate*100)+'%';
  }

  _adjTax(delta){
    const tr=this.state.treasury;
    const newRate=Math.max(0.05,Math.min(0.25,Math.round((tr.taxRate+delta)*1000)/1000));
    if(newRate===tr.taxRate)return;
    tr.taxRate=newRate;
    this._hudTaxChip({rate:newRate});
    this.engine._news(delta>0?'warn':'good',
      `Tax ${delta>0?'raised':'lowered'} to ${Math.round(newRate*100)}%`,
      `Manual adjustment by player. Auto-adjust still active weekly.`);
  }

  _hlAgent(id){
    document.querySelectorAll('.ar').forEach(e=>e.classList.remove('sel'));

  _sizeHUD(){
    const canvas=document.querySelector('#gw canvas');
    const hud=document.getElementById('hr');
    if(!canvas||!hud)return;
    const resize=()=>{
      const r=canvas.getBoundingClientRect();
      hud.style.width=r.width+'px';
      hud.style.height=r.height+'px';
      hud.style.left=r.left+'px';
      hud.style.top=r.top+'px';
      hud.style.transform='none';
    };
    resize();
    new ResizeObserver(resize).observe(document.documentElement);
    window.addEventListener('resize',resize);
  }
