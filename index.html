.wch{background:#2a1400;color:#fbbf24;border-color:#92400e}
.wfr{background:#1a1d2a;color:#94a3b8;border-color:#334155}

<body>
<div id="gw">
  <div id="hr"><div class="hs" id="hs"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
'use strict';
// ══════════════════════════════════════════════════════════════
//  ISLAND SIM  v5
//  1) House assignment: each couple one house, singles own house
//  2) Marriage system: singles can propose
//  3) Overlap offset: left-to-right 15px steps in shared cell
//  4) Universal slow heartbeat: every agent bobs 10px every 5s
//  5) Right panel: richer agent info card
//  6) Removed duplicates (Treasury shown once; date once; etc.)
//  7) Recalibrated economy: 1 food/day/agent, realistic cash flows
//  8) Building interactions: museum earns, hospital spends medicine,
//     movement burns fuel, shop sells goods, etc.
// ══════════════════════════════════════════════════════════════

const W=1280, H=720;
const LP=320, RP=350, TH=60, BH=40;

// ── OLLAMA: each agent is a local LLM character ──────────────
// Every agent periodically sends their situation to Ollama and gets
// back a first-person thought (≤15 words). That thought is stored in
// their memory and shown in the agent detail panel when selected.
// Agents with different personalities reason differently about the
// same events — a pragmatic mayor trades coolly while a worried doctor
// panics at a medicine shortage. Mood shifts based on their reasoning.
// Requires: ollama pull llama3.2  (or any model)
const OLLAMA_URL='http://localhost:11434/api/chat';
const OLLAMA_MODEL='llama3.2';
let ollamaOnline=false;

async function checkOllama(){
  try{
    const r=await fetch('http://localhost:11434/api/tags',{signal:AbortSignal.timeout(2000)});
    if(r.ok){const j=await r.json();ollamaOnline=j.models?.length>0;}
  }catch{ollamaOnline=false;}
  document.querySelectorAll('.od').forEach(d=>d.className=ollamaOnline?'od':'od off');
  document.querySelectorAll('.ai-lbl').forEach(el=>el.textContent=ollamaOnline?'AI live':'AI off');
}

// Generate one agent's thought given their current situation.
// Returns a thought string, or null if Ollama is offline.
async function ollamaThink(agent, worldCtx){
  if(!ollamaOnline)return null;
  const exp=Object.entries(agent.experience||{})
    .filter(([,d])=>d>0).map(([r,d])=>`${r}(${d}d)`).join(', ')||'none';
  const prompt=
`You are ${agent.name}, ${agent.role.replace(/_/g,' ')} on a small island community.
Personality: ${agent.per}
Status: mood ${Math.round((agent.mood+1)/2*100)}% health ${Math.round(agent.health*100)}% cash $${agent.cash}
Currently: ${agent.state} at ${agent.pos.col},${agent.pos.row}
Experience: ${exp}
Recent memory: ${agent.memory.slice(-2).join(' | ')||'none'}
World: ${worldCtx}
Respond with ONE sentence (max 15 words), first person, present tense. What are you thinking right now?`;
  try{
    const r=await fetch(OLLAMA_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      signal:AbortSignal.timeout(10000),
      body:JSON.stringify({model:OLLAMA_MODEL,messages:[{role:'user',content:prompt}],stream:false})
    });
    if(!r.ok)return null;
    const j=await r.json();
    return j.message?.content?.trim()||null;
  }catch{return null;}
}

// Queue-based agent thought system.
// Agents are queued and thoughts generated one at a time to avoid
// flooding Ollama with concurrent requests. Each agent gets a new
// thought roughly every 2 sim-hours (real-time depends on speed setting).
const THINK_QUEUE=[];
let thinkBusy=false;

function queueThink(agent, worldCtx, onDone){
  // Deduplicate — only one pending thought per agent
  if(THINK_QUEUE.some(q=>q.id===agent.id))return;
  THINK_QUEUE.push({id:agent.id, agent, worldCtx, onDone});
  if(!thinkBusy)_processThinkQueue();
}

async function _processThinkQueue(){
  if(THINK_QUEUE.length===0){thinkBusy=false;return;}
  thinkBusy=true;
  const job=THINK_QUEUE.shift();
  const thought=await ollamaThink(job.agent, job.worldCtx);
  if(thought){
    job.agent.lastThought=thought;
    job.agent.memory.push(`[thought] ${thought}`);
    if(job.agent.memory.length>8)job.agent.memory.shift();
    // Thought subtly shifts mood based on content sentiment
    if(/worried|fear|danger|crisis|fail|starv|broke/.test(thought.toLowerCase()))
      job.agent.mood=Math.max(-1,job.agent.mood-0.04);
    else if(/happy|great|good|hope|excit|proud|love/.test(thought.toLowerCase()))
      job.agent.mood=Math.min(1,job.agent.mood+0.03);
    if(job.onDone)job.onDone(thought);
  }
  // Small delay between requests
  setTimeout(_processThinkQueue, 500);
}


const MAP=[

  ['road', 'road', 'road', 'road', 'road', 'road', 'road', 'road' ],

  ['house','house','house','house','house','house','house','dock'  ],
];
const ROWS=8,COLS=8;

// BFS pathfinding on road cells
function bldgRoad(col,row){
  for(const[dc,dr]of[[0,-1],[0,1],[-1,0],[1,0]]){
    const nc=col+dc,nr=row+dr;
    if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&MAP[nr][nc]==='road')return{col:nc,row:nr};
  }
  return{col,row};
}
function bfsPath(fc,fr,tc,tr){
  if(fc===tc&&fr===tr)return[];
  const toT=MAP[tr][tc];
  const entry=toT==='road'?{col:tc,row:tr}:bldgRoad(tc,tr);
  const fromT=MAP[fr][fc];
  const start=fromT==='road'?{col:fc,row:fr}:bldgRoad(fc,fr);
  const key=(c,r)=>c+','+r;
  const vis=new Set([key(start.col,start.row)]);
  const q=[{col:start.col,row:start.row,path:[]}];
  let rp=null;
  while(q.length){
    const cur=q.shift();
    if(cur.col===entry.col&&cur.row===entry.row){rp=[...cur.path,{col:cur.col,row:cur.row}];break;}
    for(const[dc,dr]of[[0,-1],[0,1],[-1,0],[1,0]]){
      const nc=cur.col+dc,nr=cur.row+dr,k=key(nc,nr);
      if(nc<0||nc>=COLS||nr<0||nr>=ROWS||vis.has(k))continue;
      if(MAP[nr][nc]==='road'){vis.add(k);q.push({col:nc,row:nr,path:[...cur.path,{col:cur.col,row:cur.row}]});}
    }
  }
  if(!rp)return[{col:tc,row:tr}];
  const full=[];
  if(fromT!=='road')full.push({col:start.col,row:start.row});
  full.push(...rp.slice(1));
  if(toT!=='road')full.push({col:tc,row:tr});
  return full;
}

// Score how well an agent fits a career based on personality keywords
function careerFitScore(agent, careerKey){
  const career=CAREERS[careerKey]; if(!career)return 0;
  const per=(agent.per||'').toLowerCase();
  const keyHits=career.fit.filter(k=>per.includes(k)).length;
  const moodBonus=((agent.mood+1)/2)*10;        // happier agents perform better
  const healthBonus=agent.health*8;
  const repBonus=(agent.socialCredit-50)*0.1;  // individual social credit bonus
  const tenureBonus=agent.role===careerKey?15:0; // incumbents have experience edge
  return Math.round(keyHits*20 + moodBonus + healthBonus + repBonus + tenureBonus);
}

// ── WORLD ENGINE ─────────────────────────────────────────────
class WorldEngine{
  constructor(state,agents){
    this.s=state; this.a=agents;
    this._ev={}; this._fired=new Set();
    this._iM=1; this._eM=1; this._tM=1;
    this._belogCallback=null; // fires when a building economy event happens
  }
  tick(dtMs,spd){
    if(!spd)return;
    const t=this.s.time;
    // 6 real-min = 24 sim-hours → 1 real-sec = 4 sim-min at 1×
    t.minute+=(dtMs/1000)*4*spd;
    while(t.minute>=60){t.minute-=60;t.hour++;this._hourTick();}
    while(t.hour>=24) {t.hour-=24;this._dayTick();}
    this._tickNeeds(dtMs*spd/1000*4);
    this._updateStates();
    // 8) Building interactions per agent per tick
    this._buildingInteractions(dtMs*spd/1000*4);
    this._recalc();
    this._checkGO();
    // Integer enforcement: cash and treasury must always be whole numbers
    this.s.treasury.balance=Math.round(this.s.treasury.balance);
    this.a.forEach(a=>{a.cash=Math.round(a.cash);a.sav=Math.round(a.sav||0);a.loan=Math.round(a.loan||0);});
    this.emit('update',{s:this.s,a:this.a});
  }

  _hourTick(){
    const t=this.s.time,h=Math.floor(t.hour),dow=t.dayOfWeek,k=t.day+'-'+h;
    if(this._fired.has(k))return; this._fired.add(k);
    if(this._fired.size>200){const old=t.day-2;this._fired.forEach(fk=>{if(+fk.split('-')[0]<old)this._fired.delete(fk);});}
    if(dow===1&&h===8) {this._paySalaries(); this._agentFinanceWeekly();}
    if(dow===4&&h===8) this._collectTax();
    if(t.day===this.s.supply.nextDay&&h===9) this._shipment();
    if(dow===7&&h===9) this._sundayChurch();
    if(dow===7&&h===20)this._taraReview();
    // Criminal system — runs every hour
    this._thiefTick();
    this._policePpatrol();
    if(t.day%30===0&&h===0){this._crisisRoll(); this._careerElection();}
    // Mayor vote-of-no-confidence: happiness < 35 triggers snap election
    if(t.day%7===0&&h===6){if(this.s.metrics.happiness<35&&!this._snapCooldown){this._mayorElection(true);this._snapCooldown=true;setTimeout(()=>{this._snapCooldown=false;},1000*60*30);}}
    // 1) Rent collection every Thursday 09:00
    if(dow===4&&h===9) this._collectRent();
  }

  _dayTick(){
    const t=this.s.time;
    t.day++; t.dayOfWeek=(t.dayOfWeek%7)+1;
    if(t.dayOfWeek===1)t.week++;
    // Reset daily ledger
    this.s.ledger=[];
    this.s.bldg.hotel.revenueToday=0;
    this.s.bldg.museum.revenueToday=0;
    this.s.bldg.shop.salesRevenue=0;
    this.s.bldg.hospital.medUsedToday=0;
    this.a.forEach(a=>{a.fuelUsedToday=0;});
    this._dailyFood();
    this._updateDynamicPrices();
    this._updateFutures();
    this._dailyExports();
    this._tourism();
    this._buildingDegradation(); // daily condition decay + maintenance cost
    this._roadDecay();
    this._expireCrises();
    this._museumDaily();
    this._agentFinanceDaily();
    this._zackFenceLoot(); // thieves fence stolen goods daily
    // Experience accumulation
    this.a.forEach(a=>{
      if(a.state==='working'&&a.role){
        if(!a.experience)a.experience={};
        a.experience[a.role]=(a.experience[a.role]||0)+1;
      }
    });
    // Weekly: summary + community events + mayor tax adjustment
    if(t.dayOfWeek===7){
      this._weeklyCommEvents();
      this._mayorTaxAdjust();
      this._buildWeeklySummary();
      this.emit('weekly', this.s.weeklySummary);
    }
  }

  _tickNeeds(secs){
    const r=secs/3600;
    this.a.forEach(a=>{
      if(a.state!=='sleeping'){
        a.needs.hunger=Math.min(1,a.needs.hunger+.05*r); // 1 meal satisfies 20 sim-hours
        a.needs.sleep =Math.min(1,a.needs.sleep+.035*r);
      }else{
        a.needs.sleep =Math.max(0,a.needs.sleep-.12*r);
        a.needs.hunger=Math.min(1,a.needs.hunger+.01*r);
      }
      const base=.5-a.needs.hunger*.35-a.needs.sleep*.25-(1-a.health)*.40-(a.cash<30?.20:0);
      a.mood=Math.max(-1,Math.min(1,base));
      // Crime probability: base + mood deficit + cash stress + active thief + low credit
      const creditFactor=(60-(a.socialCredit||60))/100*0.20; // low credit → higher crime prob
      a.crimProb=Math.max(0,
        .02+
        (1-(a.mood+1)/2)*.20+
        (a.cash<20?.12:0)+
        (a.isThief?.30:0)+           // active thieves have high crime prob
        (a.bankrupt?.08:0)+
        creditFactor
      );
    });
  }

  _updateStates(){
    const t=this.s.time,h=t.hour,dow=t.dayOfWeek;
    const isWork=dow>=1&&dow<=5&&h>=8&&h<17,isSun=dow===7&&h>=9&&h<12,isSleep=h>=21||h<6;
    const isNight=h>=21||h<5;
    this.a.forEach(a=>{
      // Detained agents: stay at police station
      if(a.detained){
        a.state='detained';
        const pd={col:6,row:5};
        if(a.destination?.col!==pd.col||a.destination?.row!==pd.row){
          a.destination=pd; a.path=bfsPath(a.pos.col,a.pos.row,pd.col,pd.row); a.pathStep=0;
        }
        return;
      }
      // Active thieves: squatter sleep during day, roam at night
      if(a.isThief){
        if(isNight){
          a.state='stealing'; // _thiefTick sets destination
        } else {
          // Sleep in a vacant/squatted house during the day
          a.state='sleeping';
          const sc=a.squatterCell||{col:6,row:7}; // default near dock
          if(a.destination?.col!==sc.col||a.destination?.row!==sc.row){
            a.destination=sc; a.path=bfsPath(a.pos.col,a.pos.row,sc.col,sc.row); a.pathStep=0;
          }
        }
        return;
      }
      let nd=null;
      if(isSleep) {a.state='sleeping';nd=a.houseCell;}
      else if(isSun){a.state='church'; nd={col:3,row:4};}
      else if(h>=6&&h<8){a.state='commuting';nd=a.wp||a.houseCell;}
      else if(h>=13&&h<14){a.state='lunch';nd={col:0,row:4};}
      else if(a.health<.25){a.state='hospital';nd={col:3,row:5};}
      else if(isWork&&a.wp){
        a.state=a.mood<-.4&&Math.random()<.2?'idle':'working';
        nd=a.state==='idle'?{col:6,row:4}:a.wp;
      }else{
        const sc=WSCHED[a.id];
        if(sc){const sl=[...sc].reverse().find(s=>h>=s.h);if(sl){a.state='social';nd={col:sl.c,row:sl.r};}}
        if(!nd&&h>=17&&h<21){a.state='social';nd={col:6,row:4};}
      }
      if(nd&&(a.destination?.col!==nd.col||a.destination?.row!==nd.row)){
        a.destination=nd;
        a.path=bfsPath(a.pos.col,a.pos.row,nd.col,nd.row);
        a.pathStep=0;
      }
    });
  }

  // 8) BUILDING INTERACTIONS — called each tick
  _buildingInteractions(secs){
    const inv=this.s.inv, bldg=this.s.bldg, t=this.s.time;
    this.a.forEach(a=>{
      const ct=MAP[a.pos.row]?.[a.pos.col];
      if(!ct)return;

      // 8a) FUEL: every cell step burns 0.05L of fuel
      // We handle this in _advanceAgentWalk in scene, but also track here
      // Fuel drain: 10L/day total (17 agents × ~6 steps/day × 0.1L ≈ 10L)

      // 8b) HOSPITAL: agent present + health < 0.8 → consume medicine
      if(ct==='hospital'&&a.health<0.8&&inv.medicine.qty>0){
        const dose=Math.min(secs/3600*0.05, 0.02); // 0.05 units/hour
        const healed=dose*0.8;
        inv.medicine.qty=Math.max(0,inv.medicine.qty-dose);
        a.health=Math.min(1,a.health+healed);
        bldg.hospital.medUsedToday+=dose;
        const cost=dose*inv.medicine.buy;
        a.cash=Math.max(0,a.cash-cost*0.5); // patient pays half
        this.s.treasury.balance+=Math.round(cost*0.5);
      }

      // 8c) SHOP: agents buy food — shopkeeper experience affects service speed (more stock served per tick)
      if(ct==='shop'&&(a.state==='lunch'||a.state==='social')&&a.needs.hunger>0.5&&a.cash>5){
        const shopEff=this._expEfficiency('shopkeeper'); // 0.4–1.0
        const qty=1;
        const price=Math.round(inv.food.sell*(1+this.s.supply.status==='blocked'?.5:0));
        // Low-experience shopkeeper: higher price markup (less negotiation skill)
        const effPrice=Math.round(price*(2-shopEff)); // eff=0.4 → price×1.6, eff=1.0 → price×1.0
        if(inv.food.qty>=qty&&a.cash>=effPrice){
          a.cash-=effPrice;
          a.needs.hunger=Math.max(0,a.needs.hunger-0.4*shopEff);
          inv.food.qty=Math.max(0,inv.food.qty-qty);
          bldg.shop.salesRevenue+=effPrice;
          this.s.treasury.balance+=Math.round(effPrice*this.s.treasury.taxRate);
          this._ledger(`${a.name} bought food at Shop`,effPrice,'spend');
        }
      }

      // 8d) CHURCH: donations during sunday
      if(ct==='church'&&t.dayOfWeek===7&&Math.random()<secs/3600*0.3){
        const donation=Math.floor(2+Math.random()*8);
        if(a.cash>=donation){
          a.cash-=donation;
          bldg.church.donations+=donation;
          this.s.treasury.balance+=Math.round(donation*0.4); // 40% to treasury
        }
      }

      // 8e) PARK: tourists spend at park
      if(ct==='park'&&a.id==='tara'&&Math.random()<secs/3600*0.1){
        const tourRev=this.s.metrics.tourists*2; // $2/tourist/hour at park
        this.s.treasury.balance+=Math.round(tourRev);
        if(tourRev>0)this._ledger(`Park tourist spend`,tourRev,'earn');
      }

      // 8f) HOTEL: tourists staying overnight
      if(ct==='hotel'&&t.hour>=21&&t.hour<22&&bldg.hotel.guests>0){
        const nightly=bldg.hotel.guests*60; // $60/guest/night
        bldg.hotel.revenueToday+=nightly;
        this.s.treasury.balance+=Math.round(nightly*0.3); // 30% hotel tax
        this._ledger(`Hotel revenue`,nightly,'earn');
        bldg.hotel.guests=0; // reset after counting
      }

      // 8g) placeholder for future pub mechanic
    });
  }

  // 7) FOOD: realistic 1 food unit per agent per day
  _dailyFood(){
    const inv=this.s.inv;
    const total=this.a.length; // 17 agents
    const touristFood=Math.floor(this.s.metrics.tourists*0.3);
    const needed=total+touristFood;
    if(inv.food.qty>=needed){
      inv.food.qty-=needed;
      this.a.forEach(a=>{a.needs.hunger=Math.max(0,a.needs.hunger-.85);});
      this._ledger(`Daily food (${needed} units)`,-(needed*inv.food.buy),'spend');
    }else{
      // Partial food — hunger increases
      const ratio=inv.food.qty/needed;
      inv.food.qty=0;
      this.a.forEach(a=>{
        a.needs.hunger=Math.min(1,a.needs.hunger+(1-ratio)*0.3);
        if(ratio<0.3)a.health=Math.max(0,a.health-.05);
      });
      this._news('crisis','Food shortage!',`Only ${Math.floor(ratio*100)}% of daily food available.`);
    }
    // fuel: 17 agents × ~6 steps/day × 0.05L = ~5L/day bulk estimate
    if(inv.fuel.qty>=5){inv.fuel.qty-=5;this._ledger('Daily fuel (base)',-5*inv.fuel.buy,'fuel');}
    else{this._news('warn','Low fuel','Movement efficiency reduced.');}
  }

  // Helper: efficiency multiplier for a private role worker (0.4–1.0)
  // Full efficiency at minExp days, 40% base for brand-new hires
  _expEfficiency(roleKey){
    const career=CAREERS[roleKey];
    if(!career||career.public||career.minExp===0)return 1.0;
    const worker=this.a.find(a=>a.role===roleKey&&a.state==='working');
    if(!worker)return 0.6; // vacant role
    const exp=(worker.experience&&worker.experience[roleKey])||0;
    if(exp>=career.minExp)return 1.0;
    // Linear ramp: 0.4 at day-0 → 1.0 at minExp days
    return Math.round((0.4+(0.6*(exp/career.minExp)))*100)/100;
  }

  // ── DYNAMIC PRICE ENGINE ─────────────────────────────────────
  // Dock (exports): high inventory → lower price. Depleted → price recovers.
  // Airport (imports): scarce stock → world charges more. Crisis → surcharge.
  // Prices always bounded between 40%–250% of nominal.
  _updateDynamicPrices(){
    const inv=this.s.inv;
    const bldg=this.s.bldg;
    const day=this.s.time.day;

    // ── DOCK: export price dynamics ──────────────────────────
    // Each export good tracks dockStock = qty at time of last export.
    // After export (qty drops) → price recovers toward nominal.
    // If qty is high (surplus) → buyer pays less (oversupply discount).
    const exportGoods=['goods','fish','minerals'];
    let dockIdx=1.0;
    exportGoods.forEach(k=>{
      const it=inv[k]; if(!it)return;
      const nom=it.nominalExport||it.exportPrice||1;
      // Surplus ratio: qty vs 3× daily production (= healthy 3-day buffer)
      const healthyQty=(it.dailyProd||1)*3;
      const ratio=it.qty/healthyQty; // >1 = surplus, <1 = depleted

      // Dock just exported → dockStock resets. Price recovers +5%/day toward nominal.
      if(it.dockStock>0&&it.qty<it.dockStock){
        // Export happened — start recovery
        it._priceRecovery=(it._priceRecovery||0)+1;
      }
      it.dockStock=it.qty;

      // Supply/demand multiplier
      // ratio 0 = depleted  → price 150% nominal (recovery)
      // ratio 1 = healthy   → price 100% nominal
      // ratio 3+ = surplus  → price 60% nominal (oversupply)
      let priceMult;
      if(ratio<=0)       priceMult=1.50; // just exported, depleted
      else if(ratio<0.5) priceMult=1.0+(0.5*(1-ratio/0.5)); // 100→150%
      else if(ratio<=1)  priceMult=1.0;  // nominal
      else               priceMult=Math.max(0.60, 1.0-0.13*(ratio-1)); // surplus discount

      // World crisis modifiers on export price
      if(this._has('world_war'))  priceMult*=0.1;  // war blockade crushes export value
      if(this._has('recession'))  priceMult*=0.75; // recession → less world demand
      if(this._has('trade_boom')) priceMult*=1.25; // boom → premium export price

      priceMult=Math.max(0.4,Math.min(2.5,priceMult))*this._eM;
      it.exportPrice=Math.round(nom*priceMult);
      dockIdx+=priceMult; // running average
    });
    bldg.dockPriceIndex=Math.round(dockIdx/exportGoods.length*100)/100;

    // ── AIRPORT: import price dynamics ────────────────────────
    // Flight cost = base $50 + crisis surcharge. Paid per shipment.
    // Import buy prices rise when island is desperate (low stock).
    const importGoods=['food','medicine','fuel','rawMat'];
    let airIdx=1.0;
    importGoods.forEach(k=>{
      const it=inv[k]; if(!it)return;
      const nomBuy=it.nominalBuy||it.buy||1;
      const nomSell=it.nominalSell||it.sell||0;
      const daysLeft=it.use>0?it.qty/it.use:99;

      // Desperation: island running low → world charges more
      // 7+ days supply → normal price
      // 3-7 days → +20%
      // <3 days → +50%
      // 0 days → +100% (emergency buy)
      let buyMult;
      if(daysLeft>=7)      buyMult=1.0;
      else if(daysLeft>=3) buyMult=1.2;
      else if(daysLeft>0)  buyMult=1.5;
      else                 buyMult=2.0;

      // World crisis surcharges on import prices
      if(this._has('world_war'))  buyMult*=3.0;  // war → scarce supply
      if(this._has('recession'))  buyMult*=1.4;  // recession → inflation
      if(this._has('pandemic'))   buyMult*=(k==='medicine'?4.0:1.1);
      if(this._has('storm'))      buyMult*=1.3;  // storm delays = premium
      if(this._has('trade_boom')) buyMult*=0.85; // boom → cheaper imports

      buyMult=Math.max(0.4,Math.min(4.0,buyMult))*this._iM;
      // Reputation (social credit): high rep → better import deals (max -15%)
      const repDiscount=1.0-0.15*((this.s.metrics.reputation-50)/50);
      buyMult=Math.max(0.4,buyMult*Math.max(0.6,Math.min(1.4,repDiscount)));
      it.buy=Math.round(nomBuy*buyMult);
      if(nomSell>0)it.sell=Math.round(nomSell*Math.max(1,buyMult*0.7)); // sell follows buy
      airIdx+=buyMult;
    });
    bldg.airportPriceIndex=Math.round(airIdx/importGoods.length*100)/100;

    // ── AIRPORT FLIGHT COST: per shipment ─────────────────────
    // Base $50. War → $300. Recession → $80. Storm → $120.
    let flightCost=50;
    if(this._has('world_war'))  flightCost=300;
    else if(this._has('storm')) flightCost=120;
    else if(this._has('recession'))flightCost=80;
    flightCost=Math.round(flightCost*this._iM);
    bldg.airportFlightCost=flightCost;

    // Emit price update for HUD
    this.emit('prices',{dock:bldg.dockPriceIndex,airport:bldg.airportPriceIndex,flightCost});
  }

  _dailyExports(){
    if(this.s.supply.status==='blocked')return;
    // Change 1: production only on working days (Mon–Fri)
    const dow=this.s.time.dayOfWeek;
    const isWorkDay=dow>=1&&dow<=5;
    if(!isWorkDay)return; // no factory output on weekends
    const inv=this.s.inv; let rev=0;
    const factEff=this._expEfficiency('factory_mgr');
    const effMap={goods:factEff, fish:1.0, minerals:factEff};
    ['goods','fish','minerals'].forEach(k=>{
      const it=inv[k];if(!it)return;
      const eff=effMap[k]||1.0;
      const factCondMult=this.s.bldg.factory?.condMult||1.0; // vandalism reduces output
      const prod=Math.round((it.dailyProd||0)*eff*this.s.bldg.factory.outputRate*factCondMult);
      const theft=Math.random()<this.s.supply.theft?prod*.2:0;
      const out=prod-theft;
      // Use dynamic exportPrice (already set by _updateDynamicPrices)
      rev+=out*(it.exportPrice||it.nominalExport||0);
      it.dockStock=it.qty; // record pre-export stock for next day's price calc
      it.qty=Math.max(0,(it.qty||0)+out);
    });
    if(rev>0){this.s.treasury.balance+=Math.round(rev);this._ledger(`Dock exports`,rev,'earn');}
    if(factEff<0.6){
      const mgr=this.a.find(a=>a.role==='factory_mgr');
      this._news('warn','Factory efficiency',`${mgr?.name||'Manager'} learning — ${Math.round(factEff*100)}% output.`);
    }
  }

  _tourism(){
    const m=this.s.metrics,bldg=this.s.bldg;
    // Tourist count is computed in _recalc interaction matrix — don't recalculate here.
    // If blocked, zero out (recalc may not run every day in crisis)
    if(this.s.supply.status==='blocked'||this._has('pandemic'))m.tourists=0;
    // Airport arrival tax $10/tourist/day
    const airTax=m.tourists*10;
    if(airTax>0){this.s.treasury.balance+=Math.round(airTax);this._ledger(`Airport tax (${m.tourists} tourists)`,airTax,'earn');}
    // Hotel occupancy: 70% of tourists stay overnight
    bldg.hotel.guests=Math.floor(m.tourists*.7);
  }

  // Museum charges tourists $15/visit
  _museumDaily(){
    const bldg=this.s.bldg;
    if(!bldg.museum.open)return;
    const visits=Math.floor(this.s.metrics.tourists*.8);
    const rev=visits*15;
    bldg.museum.visitors=visits;
    bldg.museum.revenueToday=rev;
    this.s.treasury.balance+=Math.round(rev);
    if(rev>0)this._ledger(`Museum visits (${visits})`,rev,'earn');
  }

  // ── BUILDING DEGRADATION & MAINTENANCE ───────────────────────
  // Each building degrades 0.3–0.8 condition/day naturally.
  // Upkeep worker (Pat) repairs all buildings +condition each day he works.
  // Treasury pays daily maintenance costs; if treasury can't afford → no repair.
  // Building condition affects: output multiplier, revenue, tourist satisfaction.
  // Vandalism from Zack adds extra degradation. 
  _buildingDegradation(){
    const b=this.s.bldg, tr=this.s.treasury;
    const pat=this.a.find(a=>a.id==='pat'&&a.state==='working');
    const patBonus=pat?(0.3+(pat.experience?.upkeep_worker||0)/100*0.7)*3:0; // 0.3–3 repair/day
    const canAfford=tr.balance>100;
    let totalMaintCost=0;

    // ── Buildings ──────────────────────────────────────────────
    const BLDG_KEYS=['hotel','airport','museum','townhall','upkeep','factory',
                     'shop','church','park','bank','hospital','police','dock'];
    BLDG_KEYS.forEach(k=>{
      const bl=b[k]; if(!bl)return;
      const base=bl.maintenanceCost||4;
      const vandalismMult=1+(bl.vandalism||0)*0.3; // vandalism increases upkeep cost
      const cost=Math.round(base*vandalismMult);
      totalMaintCost+=cost;

      // Degrade: natural decay + vandalism damage
      const decay=0.4+(bl.vandalism||0)*1.5+Math.random()*0.3;
      bl.condition=Math.max(0,Math.min(100,(bl.condition||80)-decay));

      // Repair if treasury can afford
      if(canAfford&&pat){
        const repairAmt=patBonus*(bl.vandalism>0?1.5:1); // faster repair of vandalism
        bl.condition=Math.min(100,(bl.condition||80)+repairAmt);
        if(bl.vandalism>0)bl.vandalism=Math.max(0,bl.vandalism-1); // reduce vandalism over time
      }

      // Condition → output multiplier (used by exports, revenue etc.)
      bl.condMult=Math.max(0.3, bl.condition/100); // 30%–100% of normal output
    });

    // ── Houses ─────────────────────────────────────────────────
    Object.entries(b.houses||{}).forEach(([hid,hb])=>{
      const cost=hb.maintenanceCost||2;
      totalMaintCost+=cost;
      const decay=0.2+(hb.vandalism||0)*1.0+Math.random()*0.2;
      hb.condition=Math.max(0,Math.min(100,(hb.condition||80)-decay));
      if(canAfford&&pat){
        hb.condition=Math.min(100,(hb.condition||80)+patBonus*0.4);
        if(hb.vandalism>0)hb.vandalism=Math.max(0,hb.vandalism-1);
      }
    });

    // Charge maintenance to treasury
    if(canAfford){
      tr.balance-=totalMaintCost;
      this._ledger('Building maintenance',-totalMaintCost,'spend');
    }else{
      // Can't afford maintenance — accelerate decay
      BLDG_KEYS.forEach(k=>{if(b[k])b[k].condition=Math.max(0,(b[k].condition||80)-0.5);});
      if(Math.random()<0.1)this._news('warn','Maintenance crisis','Treasury too low. Buildings deteriorating fast.');
    }

    // Apply condition to upkeep efficiency (for Tara reviews etc.)
    b.upkeep.efficiency=Math.round(b.upkeep.condition||80);
  }

  _roadDecay(){
    const pat=this.a.find(a=>a.id==='pat');
    this.s.bldg.upkeep.efficiency=Math.min(100,Math.max(0,
      this.s.bldg.upkeep.efficiency-2+(pat?.state==='working'?9:0)));
  }

  _paySalaries(){
    const d=this.s.treasury.deficitPct;
    const cut=d>40?.4:d>25?.65:d>10?.85:1;
    let total=0;
    this.a.forEach(a=>{if(!a.sal)return;const p=Math.round(a.sal*cut);a.cash+=p;total+=p;});
    this.s.treasury.balance-=total;
    this._ledger(`Salaries (${cut<1?Math.round(cut*100)+'%':'full'})`,-total,'spend');
    if(cut<1){
      this.a.forEach(a=>{if(a.sal)a.mood=Math.max(-1,a.mood-.12);});
      this._news('warn','Salary cut',`Paid at ${Math.round(cut*100)}% due to deficit.`);
    }
  }

  _collectTax(){
    let tot=0;
    this.a.forEach(a=>{
      if(a.noTax||a.squatter)return; // thieves exempt from property tax
      const h=HOUSES[a.houseId];
      if(!h)return;
      const weekly=Math.round(h.value*this.s.treasury.taxRate/52);
      if(a.cash>=weekly){a.cash-=weekly;tot+=weekly;}
      else{a.mood=Math.max(-1,a.mood-.08);}
    });
    this.s.treasury.balance+=Math.round(tot);
    this._ledger(`House tax`,tot,'earn');
  }

  // 1) Rent: single renters pay Fay weekly
  _collectRent(){
    const fay=this.a.find(a=>a.id==='fay');
    const rentMult=this.s.treasury.rentMult||1.0; // reputation-driven multiplier
    let rentIncome=0;
    for(const[hid,h]of Object.entries(HOUSES)){
      if(h.rentPerWeek===0)continue;
      h.residents.forEach(rid=>{
        const renter=this.a.find(a=>a.id===rid);
        if(!renter)return;
        if(renter.noRent||renter.squatter)return; // thieves/squatters exempt
        const rent=Math.round(h.rentPerWeek*rentMult);
        if(renter.cash>=rent){
          renter.cash-=rent;
          rentIncome+=rent;
          if(fay)fay.cash+=rent*.7;
          this.s.treasury.balance+=Math.round(rent*.3);
          this._ledger(`${renter.name} rent`,rent,'earn');
        }else{
          renter.mood=Math.max(-1,renter.mood-.1);
          this._news('warn','Rent default',`${renter.name} cannot pay rent $${rent}.`);
        }
      });
    }
    this.s.treasury.rentIncome=rentIncome;
  }

  _shipment(){
    if(this.s.supply.status==='blocked'){this._news('crisis','Shipment blocked','No imports.');return;}
    const inv=this.s.inv; let cost=0;
    // Pay airport flight cost first (dynamic, affected by crises)
    const flightCost=this.s.bldg.airportFlightCost||50;
    if(this.s.treasury.balance>=flightCost){
      this.s.treasury.balance-=Math.round(flightCost);
      cost+=flightCost;
      this._ledger(`Airport flight fee`,-flightCost,'spend');
    }else{
      this._news('warn','No flight funds',`Cannot afford $${flightCost} flight. Shipment skipped.`);
      return;
    }
    // Restock using current dynamic buy prices (already updated by _updateDynamicPrices)
    const rs=(k,tgt)=>{
      const it=inv[k];if(!it)return;
      const n=Math.max(0,tgt-it.qty);
      const unitCost=it.buy; // dynamic price already applied
      if(n>0&&this.s.treasury.balance>=n*unitCost){
        it.qty+=n; cost+=n*unitCost;
        this.s.treasury.balance-=Math.round(n*unitCost);
      }else if(n>0){
        // Can only afford partial restock
        const canAfford=Math.floor(this.s.treasury.balance/unitCost);
        if(canAfford>0){it.qty+=canAfford;cost+=Math.round(canAfford*unitCost);this.s.treasury.balance-=Math.round(canAfford*unitCost);}
      }
    };
    rs('food',Math.ceil(17*14));
    rs('medicine',28);
    rs('fuel',140);
    rs('rawMat',280);
    this.s.supply.nextDay=this.s.time.day+this.s.supply.interval;
    const airIdx=this.s.bldg.airportPriceIndex||1;
    const priceNote=airIdx>1.3?` ⚠ +${Math.round((airIdx-1)*100)}% surcharge`:'';
    this._ledger(`Shipment + flight`,-Math.round(cost),'spend');
    this._news('info','Shipment arrived',`Total $${Math.round(cost)} (flight $${flightCost}${priceNote}).`);
  }

  _sundayChurch(){
    const att=this.a.filter(a=>a.state==='church');
    att.forEach(a=>{a.mood=Math.min(1,a.mood+.16);});
    this.s.prayer=Math.min(100,this.s.prayer+att.length+8);
    this._news('info','Sunday service',`${att.length} attended. Prayer +${att.length+8}.`);
    this._churchRedemption(); // redemption rolls for thieves/convicts
  }

  _taraReview(){
    const tara=this.a.find(a=>a.id==='tara');if(!tara)return;
    const m=this.s.metrics,b=this.s.bldg;
    let sc=50;
    // Crime safety
    if(m.crimeRate<15)sc+=15;else if(m.crimeRate<30)sc+=8;else if(m.crimeRate>50)sc-=18;
    // Infrastructure upkeep
    if(b.upkeep.efficiency>80)sc+=8;else if(b.upkeep.efficiency<50)sc-=10;
    // Park events
    if(b.park.eventToday)sc+=10;
    // Happiness of locals (tourists feel the vibe)
    if(m.happiness>70)sc+=8;else if(m.happiness<50)sc-=8;
    // Economy (prosperous islands feel better)
    if(m.economy>70)sc+=6;else if(m.economy<40)sc-=6;
    // Morale (friendly locals = better experience)
    if(m.morale>65)sc+=5;else if(m.morale<40)sc-=5;
    // No active crises = safe destination
    if(!this.s.crises.length)sc+=5;
    sc+=Math.round(tara.mood*12);
    tara.satScore=Math.max(0,Math.min(100,sc));
    // Reputation is updated gradually by _recalc reading satScore
    // Give a nudge here so the weekly review has visible impact
    m.reputation=Math.round(Math.max(0,Math.min(100,
      m.reputation*0.6 + tara.satScore*0.4
    )));
    const stars='★'.repeat(Math.max(1,Math.ceil(tara.satScore/20)));
    this._news(sc>65?'good':sc<40?'crisis':'info',
      `Tara's weekly review ${stars}`,
      `Score ${tara.satScore}/100. Island rep now ${m.reputation}.`);
  }

  // ── CAREER ELECTION (every 30 days) ─────────────────────────
  // All unique public roles are contested. Every agent scores for each
  // role based on personality keywords, mood, health, reputation, and
  // tenure bonus. Wanderers get a job-seeking bonus when broke.
  // The highest scorer takes the role; displaced incumbent becomes wanderer.
  // Mayor is a special democratic vote — low happiness triggers snap election.
  _careerElection(){
    const term=Math.floor(this.s.time.day/30)+1;
    const results=[];

    // Only PUBLIC unique roles are elected every 30 days (no term limit)
    // Private roles (factory, shop, landlord etc.) are NOT contested here
    const publicRoles=Object.keys(CAREERS).filter(k=>CAREERS[k].unique&&CAREERS[k].public&&k!=='mayor');

    publicRoles.forEach(role=>{
      const career=CAREERS[role];
      const incumbent=this.a.find(a=>a.role===role);

      const scored=this.a.map(a=>{
        let sc=careerFitScore(a,role);
        if((a.role==='wanderer'||a.role==='housewife')&&a.cash<80) sc+=8;
        sc+=Math.floor(Math.random()*6);
        return{a,sc};
      }).sort((x,y)=>y.sc-x.sc);

      const winner=scored[0];
      if(!winner)return;

      // Incumbent keeps role unless challenger beats them by >12 pts (experience advantage already in fit score)
      const incumbentScore=incumbent?careerFitScore(incumbent,role)+15:0;
      if(winner.a===incumbent||winner.sc<incumbentScore+12)return;

      const prevRole=winner.a.role;
      if(incumbent){
        incumbent.role=incumbent.g==='F'?'housewife':'wanderer';
        incumbent.wp=null; incumbent.sal=0;
        incumbent.mood=Math.max(-1,incumbent.mood-0.15);
        incumbent.memory.push(`Day ${this.s.time.day}: Lost ${role} to ${winner.a.name}.`);
        if(incumbent.memory.length>6)incumbent.memory.shift();
      }
      winner.a.role=role; winner.a.wp=career.wp; winner.a.sal=career.sal;
      winner.a.mood=Math.min(1,winner.a.mood+0.2);
      winner.a.socialCredit=Math.min(100,(winner.a.socialCredit||60)+8); // community elected them
      winner.a.memory.push(`Day ${this.s.time.day}: Elected ${role}!`);
      if(winner.a.memory.length>6)winner.a.memory.shift();
      results.push(`${winner.a.name} → ${role.replace(/_/g,' ')}`);
    });

    this._mayorElection(false);

    const summary=results.length?results.join(' · '):'No public role changes.';
    this._news('info',`Term ${term} elections`,summary);
    this.emit('career',{term,day:this.s.time.day,results});
  }

  // Mayor is elected democratically — all agents vote for best-fit candidate.
  // If snap=true this was triggered by low happiness (< 35).
  _mayorElection(snap){
    const incumbent=this.a.find(a=>a.role==='mayor');
    const career=CAREERS['mayor'];

    const scored=this.a.map(a=>{
      let sc=careerFitScore(a,'mayor');
      // Popularity bonus: agents with high mood like cheerful candidates
      sc+=Math.round(((a.mood+1)/2)*8);
      sc+=Math.floor(Math.random()*10); // democratic variance
      return{a,sc};
    }).sort((x,y)=>y.sc-x.sc);

    const winner=scored[0];
    if(!winner||winner.a===incumbent)return;

    // In snap election any challenger wins; in normal election needs +15 margin
    const threshold=snap?0:15;
    const incumbentScore=incumbent?careerFitScore(incumbent,'mayor')+20:0;
    if(!snap&&winner.sc<incumbentScore+threshold)return;

    const prevName=incumbent?.name||'(none)';
    if(incumbent){
      incumbent.role=incumbent.g==='F'?'housewife':'wanderer';
      incumbent.wp=null; incumbent.sal=0;
      incumbent.mood=Math.max(-1,incumbent.mood-0.25);
      incumbent.memory.push(`Day ${this.s.time.day}: Voted out as mayor.`);
      if(incumbent.memory.length>6)incumbent.memory.shift();
    }
    winner.a.role='mayor';
    winner.a.wp=career.wp;
    winner.a.sal=career.sal;
    winner.a.mood=Math.min(1,winner.a.mood+0.3);
    winner.a.socialCredit=Math.min(100,(winner.a.socialCredit||60)+12); // highest public trust
    winner.a.memory.push(`Day ${this.s.time.day}: Elected mayor! Score ${winner.sc}.`);
    if(winner.a.memory.length>6)winner.a.memory.shift();

    const type=snap?'warn':'good';
    const title=snap?`Snap vote: ${winner.a.name} replaces ${prevName}`:`${winner.a.name} elected mayor`;
    const body=snap
      ?`Happiness collapsed to ${this.s.metrics.happiness}. Island demands change.`
      :`Score ${winner.sc}. ${prevName} steps down.`;
    this._news(type,title,body);
    this.emit('career',{type:'mayor',winner:winner.a.name,snap,day:this.s.time.day});
  }

  _crisisRoll(){
    const pr=Math.min(.10,this.s.prayer*.001);
    [...CRISES,...GOODS].forEach(ev=>{if(Math.random()<(ev.prob-pr)/30)this._applyEvent(ev);});
    this.s.prayer=0;
  }

  _applyEvent(ev){
    const fx=ev.fx||{},inv=this.s.inv,m=this.s.metrics;
    if(fx.importBlocked)this.s.supply.status='blocked';
    if(fx.importMult)this._iM*=fx.importMult;
    if(fx.exportMult)this._eM*=fx.exportMult;
    if(fx.tourMult)  this._tM*=fx.tourMult;
    if(fx.moraleHit) m.morale=Math.max(0,m.morale-fx.moraleHit);
    if(fx.moraleBonus)m.morale=Math.min(100,m.morale+fx.moraleBonus);
    if(fx.crimeBonus)m.crimeRate=Math.min(100,m.crimeRate+fx.crimeBonus);
    if(fx.factDrop)  this.s.bldg.factory.outputRate*=(1-fx.factDrop);
    if(fx.foodBonus) inv.food.qty+=fx.foodBonus;
    if(fx.medBonus)  inv.medicine.qty+=fx.medBonus;
    if(fx.injure)    {const ag=this.a.find(a=>a.id===fx.injure);if(ag){ag.health=Math.max(.1,ag.health-.4);ag.state='hospital';}}
    if(ev.type==='world'){
      this.a.forEach(a=>{
        a.mood=Math.max(-1,Math.min(1,a.mood-.10*(ev.sev||1)*(a.ns||1)));
        a.memory.push(`Day ${this.s.time.day}: ${ev.note.title}`);
        if(a.memory.length>6)a.memory.shift();
      });
    }
    const d=Array.isArray(ev.dur)?ev.dur[0]+Math.random()*(ev.dur[1]-ev.dur[0]):(ev.dur||-1);
    this.s.crises.push({id:ev.id,end:d===-1?-1:this.s.time.day+d});
    this._news(ev.note.type,ev.note.title,ev.note.body);
    this.emit('news',this.s.log[0]);
  }

  _expireCrises(){
    this.s.crises=this.s.crises.filter(c=>c.end===-1||c.end>this.s.time.day);
    const has=id=>this._has(id);
    if(!has('world_war')&&!has('recession')){this._iM=1;this._eM=1;if(this.s.supply.status==='blocked')this.s.supply.status='normal';}
    if(!has('tour_wave')&&!has('festival'))this._tM=1;
  }

  _has(id){return this.s.crises.some(c=>c.id===id&&(c.end===-1||c.end>this.s.time.day));}

  // ── INTERACTION MATRIX ───────────────────────────────────────
  // Six core metrics interact in a weighted feedback system.
  // Each metric is computed from raw inputs PLUS cross-influence from others.
  //
  //  ECONOMY (EC): treasury health + workers active + export revenue
  //    → boosts all other metrics (multiplier on morale, happiness, reputation)
  //
  //  MORALE (MO): avg agent mood
  //    → work efficiency: high morale → more productive workers → more economy
  //    → crime: low morale → more crime
  //
  //  HAPPINESS (HA): health + hunger + mood composite
  //    → crime rate: unhappy population commits more crime
  //    → tourism: tourists prefer happy islands
  //    → morale: happiness feeds back into morale
  //
  //  REPUTATION (RE): social credit score (Tara + history)
  //    → trading fee: high rep → lower FEE (already in autoTrade)
  //    → import prices: high rep → better deals
  //    → rent premium: high rep → Fay charges more (or less crime discount)
  //    → tourism: high rep = island worth visiting
  //
  //  CRIME (CR): agent criminality × happiness deficit
  //    → reduces happiness, reputation, tourism
  //    → increases import prices (unsafe island = higher insurance)
  //
  //  TOURISTS (TU): output of the system — all other metrics combine
  //    → revenue feedback into economy
  //
  // WEIGHT MATRIX W[effect][cause] = how much cause shifts effect (0–1):
  //         EC    MO    HA    RE    CR
  // EC:    [1.00, 0.20, 0.15, 0.10, -0.15]
  // MO:    [0.25, 1.00, 0.30, 0.05, -0.10]
  // HA:    [0.20, 0.35, 1.00, 0.05, -0.25]
  // RE:    [0.15, 0.05, 0.10, 1.00, -0.20]
  // CR:    [-0.10,-0.20,-0.35,-0.15, 1.00]
  // TU:    [0.25, 0.15, 0.30, 0.25, -0.30] (tourists = all combined)
  _recalc(){
    const m=this.s.metrics, tr=this.s.treasury;

    // ── RAW INPUTS (0–100 scale) ──────────────────────────────
    const wk=this.a.filter(a=>a.state==='working').length;
    const agents=this.a.length||1;
    const avgMood=this.a.reduce((s,a)=>s+a.mood,0)/agents; // -1..1
    const avgHealth=this.a.reduce((s,a)=>s+a.health,0)/agents; // 0..1
    const avgHunger=this.a.reduce((s,a)=>s+a.needs.hunger,0)/agents; // 0..1 (higher=worse)
    const avgCrimProb=this.a.reduce((s,a)=>s+(a.crimProb||0),0)/agents;

    // Raw economy: treasury + workers + solvency
    const rawEC=Math.round(
      Math.min(1,tr.balance/4000)*40 +
      (wk/agents)*35 +
      Math.max(0,1-tr.deficitPct/100)*25
    );
    // Raw morale: avg mood mapped 0–100
    const rawMO=Math.round(Math.max(0,Math.min(100,50+avgMood*50)));
    // Raw happiness: health + satiety + mood
    const rawHA=Math.round((avgHealth*0.45 + (1-avgHunger)*0.35 + (avgMood+1)/2*0.20)*100);
    // Raw reputation: sticky social credit (Tara reviews nudge it weekly)
    // Also pulled slightly toward Tara's current satisfaction score
    const tara=this.a.find(a=>a.id==='tara');
    const taraInfluence=tara?.satScore!=null?tara.satScore:m.reputation;
    const rawRE=Math.max(0,Math.min(100, m.reputation*0.97 + taraInfluence*0.03));
    // Raw crime: avg criminal probability 0–100
    const rawCR=Math.min(100,Math.round(avgCrimProb*100));

    // ── CROSS-INFLUENCE (matrix pass) ─────────────────────────
    // Normalise each metric to 0..1, apply weights, add delta to raw value.
    const ec0=rawEC/100, mo0=rawMO/100, ha0=rawHA/100, re0=rawRE/100, cr0=rawCR/100;

    // Economy is influenced by morale (workers produce more) and reputation (trade deals)
    const ecDelta = 0.20*(mo0-0.5) + 0.10*(re0-0.5) + 0.15*(ha0-0.5) - 0.15*(cr0-0.3);
    // Morale is pulled by economy (jobs, security) and happiness, hurt by crime
    const moDelta = 0.25*(ec0-0.5) + 0.30*(ha0-0.5) - 0.10*(cr0-0.3);
    // Happiness is driven by economy (wealth), morale, crushed by crime
    const haDelta = 0.20*(ec0-0.5) + 0.35*(mo0-0.5) - 0.25*(cr0-0.3) + 0.05*(re0-0.5);
    // Reputation improves with happiness and economy, falls with crime
    const reDelta = 0.15*(ec0-0.5) + 0.10*(ha0-0.5) - 0.20*(cr0-0.3);
    // Crime falls when happy, employed, high rep; rises with desperation
    const crDelta = -0.35*(ha0-0.5) - 0.10*(ec0-0.5) - 0.15*(re0-0.5) - 0.20*(mo0-0.5);

    // Apply deltas (scaled to ±15 pts max per tick to avoid explosion)
    const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
    const scale=15;
    m.economy   =Math.round(clamp(rawEC + ecDelta*scale, 0, 100));
    m.morale    =Math.round(clamp(rawMO + moDelta*scale, 0, 100));
    m.happiness =Math.round(clamp(rawHA + haDelta*scale, 0, 100));
    m.crimeRate =Math.round(clamp(rawCR + crDelta*scale, 0, 100));
    // Reputation drifts slowly (sticky social credit) — max ±3 per recalc
    const repShift=clamp(reDelta*6, -3, 3);
    m.reputation=Math.round(clamp(m.reputation+repShift, 0, 100));

    // ── MORALE → WORK EFFICIENCY (productivity multiplier) ────
    // morale 100 → 1.30×, morale 50 → 1.00×, morale 0 → 0.55×
    this.s.bldg.factory.outputRate=clamp(0.55+0.75*(m.morale/100), 0.55, 1.30);

    // ── REPUTATION → RENT ADJUSTMENT ─────────────────────────
    // High rep = landlords charge more (desirable island); low rep = discount
    // Applied as a multiplier stored on treasury so _collectRent can use it
    tr.rentMult=clamp(0.7+(re0*0.6), 0.7, 1.3);

    // ── HAPPINESS → CRIME (direct feedback via crimProb) ──────
    // Already captured above; also apply soft clamp
    m.crimeRate=Math.round(clamp(m.crimeRate, 0, 100));

    // ── TOURISTS: all-factors output ──────────────────────────
    // Weights: economy 25%, morale 15%, happiness 30%, reputation 25%, crime -30%
    // tara already declared above for reputation input
    const ts=(tara?.satScore||65)/100;
    const crP=clamp(1-m.crimeRate/100, 0, 1);
    const tBase=3*(
      0.25*ec0 + 0.15*mo0 + 0.30*(m.happiness/100) + 0.25*(m.reputation/100) + 0.05
    )*crP*ts;
    const crisisBlock=this.s.supply.status==='blocked'||this._has('pandemic');
    m.tourists=crisisBlock?0:Math.max(0,Math.floor(tBase*8*this._tM));

    // ── INCOME/EXPENSE estimate ────────────────────────────────
    const dailySalary=this.a.reduce((s,a)=>s+(a.sal||0),0)/7;
    tr.income =Math.round(m.tourists*40 + 200 + (tr.rentIncome||0)/7);
    tr.expense=Math.round(dailySalary + 120);
    tr.deficitPct=tr.expense>0?Math.max(0,(tr.expense-tr.income)/tr.expense*100):0;

    // Store deltas for chip arrows in HUD
    this.s.deltas={
      economy:   m.economy   - (this.s._prev?.economy  ||m.economy),
      morale:    m.morale    - (this.s._prev?.morale   ||m.morale),
      happiness: m.happiness - (this.s._prev?.happiness||m.happiness),
      reputation:m.reputation- (this.s._prev?.reputation||m.reputation),
      crimeRate: m.crimeRate - (this.s._prev?.crimeRate||m.crimeRate),
      tourists:  m.tourists  - (this.s._prev?.tourists ||m.tourists),
      treasury:  tr.balance  - (this.s._prev?.balance  ||tr.balance),
    };
    this.s._prev={...m, balance:tr.balance};
  }

  _checkGO(){
    if(this.s.treasury.balance<0&&this.s.treasury.deficitPct>50)this.emit('gameover',{reason:'deficit',day:this.s.time.day});
    if(this.a.filter(a=>a.health<=0).length/this.a.length>=.3)this.emit('gameover',{reason:'population',day:this.s.time.day});
  }

  // ── AGENT PERSONAL FINANCE ───────────────────────────────────
  // Runs daily: track negative cash, trigger survival behaviours
  _agentFinanceDaily(){
    const inv=this.s.inv;
    this.a.forEach(a=>{
      // Detention daily countdown
      if(a.detained){
        a.detainedDays=Math.max(0,(a.detainedDays||0)-1);
        if(a.detainedDays<=0){
          a.detained=false;
          a.state='sleeping';
          // Thieves return to dock area; regular detainees go home
          const dest=a.isThief?this._thiefSleepCell(a):(a.houseCell||{col:0,row:0});
          a.destination=dest;
          if(a.isThief){
            // Thieves stay thieves after serving time — crime is their livelihood
            a.memory.push(`Day ${this.s.time.day}: Sentence done. Back near the dock.`);
          }else{
            a.isThief=false; // non-thief detainees get a clean slate
            a.memory.push(`Day ${this.s.time.day}: Released from custody. Sentence served.`);
          }
          if(a.memory.length>8)a.memory.shift();
          this._news('info',`${a.name} released`,`Sentence complete. Credit: ${a.socialCredit||0}.`);
        }
        return; // detained agents don't do finance
      }

      if(a.bankrupt)return;
      if(a.squatter||a.noTax)return; // off-grid thieves manage themselves
      if(a.cash<0){
        a.debtDays=(a.debtDays||0)+1;
        a.mood=Math.max(-1,a.mood-0.08);
      }else{
        a.debtDays=0;
      }

      // Bankruptcy: 7+ days with cash < 0 and no loan room
      if(a.debtDays>=7&&a.loan>=(a.sal||0)*8){
        a.bankrupt=true;
        a.cash=0; a.sav=0; a.loan=0;
        a.mood=-0.8; a.socialCredit=Math.max(0,a.socialCredit-30);
        a.role=a.g==='F'?'housewife':'wanderer';
        a.wp=null; a.sal=0;
        a.memory.push(`Day ${this.s.time.day}: Declared bankrupt. Lost job, all savings.`);
        if(a.memory.length>6)a.memory.shift();
        this._news('warn',`${a.name} bankrupt`,`Debt spiral. Lost role. Now ${a.role}.`);
        return;
      }

      // Survival sell: if cash < 15 and has savings, withdraw from savings
      if(a.cash<15&&a.sav>0){
        const draw=Math.min(a.sav, 50);
        a.sav-=draw; a.cash+=draw; a.sav=Math.round(a.sav); a.cash=Math.round(a.cash);
        this._ledger(`${a.name} withdrew savings`,-draw,'spend');
      }

      // Survival sell: if cash still low, sell alcohol or raw goods at discount
      if(a.cash<10&&inv.alcohol?.qty>0){
        const price=Math.round((inv.alcohol.sell||14)*0.7);
        inv.alcohol.qty=Math.max(0,inv.alcohol.qty-1);
        a.cash+=Math.round(price);
        this._ledger(`${a.name} sold alcohol for cash`,price,'earn');
      }

      // Opportunistic saving: if cash > 150 and salary-earning, save 20%
      if(a.cash>150&&a.sal>0&&Math.random()<0.3){
        const save=Math.round(a.cash*0.15);
        a.cash-=save; a.sav=(a.sav||0)+save;
      }
    });
  }

  // Runs weekly (Monday): loan repayments, interest, job-seeking, bank loans
  _agentFinanceWeekly(){
    const bldg=this.s.bldg;
    this.a.forEach(a=>{
      if(a.bankrupt)return;

      // Repay loan if has one
      if(a.loan>0&&a.loanWeekly>0){
        const payment=Math.min(a.loanWeekly, a.loan);
        if(a.cash>=payment){
          a.cash-=payment; a.loan-=payment;
          bldg.bank.loanBook=Math.max(0,(bldg.bank.loanBook||0)-payment);
          const interest=Math.round(a.loan*0.0019);
          bldg.bank.interestEarned=(bldg.bank.interestEarned||0)+interest;
          this.s.treasury.balance+=Math.round(interest);
          if(a.loan<=0){
            a.loan=0;a.loanWeekly=0;
            a.socialCredit=Math.min(100,(a.socialCredit||60)+5); // repaid → credit improves
            a.memory.push(`Day ${this.s.time.day}: Loan fully repaid! Credit +5.`);
          }
        }else{
          // Can't repay — increase debt
          const missed=payment-a.cash;
          a.cash=0; a.loan+=Math.round(missed*1.05);
          a.mood=Math.max(-1,a.mood-0.1);
          a.socialCredit=Math.max(0,(a.socialCredit||60)-8); // default → credit damaged
        }
      }

      // Low cash threshold (25th percentile ≈ $50): seek loan or better job
      const lowThreshold=50;
      if(a.cash<lowThreshold&&!a.bankrupt){
        // Try bank loan if no existing loan and bank is open
        if(a.loan===0&&bldg.bank.open){
          const sc=a.socialCredit||60;
          const maxLoan=sc>=40?Math.max(0,(a.sal||0)*4):0; // refused if credit < 40
          if(maxLoan>20){
            const loanAmt=Math.min(maxLoan, 200);
            a.cash+=Math.round(loanAmt);
            a.loan=Math.round(loanAmt);
            a.loanWeekly=Math.round(loanAmt/8); // repay over 8 weeks
            bldg.bank.loanBook=(bldg.bank.loanBook||0)+loanAmt;
            this.s.treasury.balance-=Math.round(loanAmt*0.8); // bank fronts 80% from treasury
            a.memory.push(`Day ${this.s.time.day}: Took $${loanAmt} loan from bank.`);
            if(a.memory.length>6)a.memory.shift();
            this._news('info',`${a.name} bank loan`,`Borrowed $${loanAmt}. Repay $${a.loanWeekly}/wk.`);
          }
        }

        // Seek better-paying PRIVATE job if wanderer/housewife
        // (public roles are elected — cannot be taken directly)
        if(a.role==='wanderer'||a.role==='housewife'){
          const privateOpen=Object.entries(CAREERS)
            .filter(([k,c])=>{
              if(c.public||!c.sal)return false; // skip public roles
              if(c.unique&&this.a.some(x=>x.id!==a.id&&x.role===k))return false; // unique and taken
              return true;
            })
            .map(([k,c])=>({k,c,fit:careerFitScore(a,k)}))
            .sort((x,y)=>y.fit-x.fit)[0]; // best fit

          if(privateOpen){
            const{k:rk,c:rc}=privateOpen;
            const exp=(a.experience&&a.experience[rk])||0;
            a.role=rk; a.wp=rc.wp; a.sal=rc.sal;
            a.mood=Math.min(1,a.mood+0.12);
            const expNote=exp<rc.minExp?` (low exp: ${exp}/${rc.minExp}d, output penalised)`:'';
            a.memory.push(`Day ${this.s.time.day}: Started ${rk}${expNote}.`);
            if(a.memory.length>6)a.memory.shift();
            this._news('info',`${a.name} hired`,`${rk.replace(/_/g,' ')} — exp ${exp}d${expNote}`);
          }
        }

        // Buy food at shop if starving and cash allows
        if(a.needs.hunger>0.7&&a.cash>5&&this.s.inv.food?.qty>0){
          const price=this.s.inv.food.sell||5;
          if(a.cash>=price){
            a.cash-=price; a.needs.hunger=Math.max(0,a.needs.hunger-0.6);
            this.s.inv.food.qty=Math.max(0,this.s.inv.food.qty-1);
          }
        }
      }
    });
  }

  // ── FUTURES INDEX (world economy) ────────────────────────────
  // Daily seeded random walk. Seed = real date (YYYYMMDD) so same calendar
  // day always produces same base trend. Island metrics tilt the walk.
  _updateFutures(){
    const f=this.s.futures;
    const t=this.s.time;
    // Seed: combine real date + sim day for deterministic-per-calendar-day variation
    const now=new Date();
    const dateSeed=now.getFullYear()*10000+(now.getMonth()+1)*100+now.getDate();
    // Simple seeded LCG for reproducible but varied daily moves
    const lcg=(s)=>(((s*1664525+1013904223)>>>0)/4294967296);
    const r1=lcg(dateSeed+t.day*7);
    const r2=lcg(dateSeed+t.day*13+1);
    // Base random move: ±2% daily, biased by island economy
    const m=this.s.metrics;
    const islandBias=(m.economy-50)/100*0.008; // island health nudges world index slightly
    const crisisBias=this.s.crises.length*-0.005;
    const move=(r1-0.5)*0.04 + islandBias + crisisBias + (r2-0.5)*0.01;
    f.prev=f.value;
    f.value=Math.max(200, Math.round(f.value*(1+move)*100)/100);
    f.change=Math.round((f.value-f.prev)*100)/100;
    f.changePct=Math.round(move*10000)/100;
    f.history.push(f.value);
    if(f.history.length>14)f.history.shift();
    // Multiplier: index deviation from 1000 affects all prices by ±15%
    f.multiplier=Math.max(0.85,Math.min(1.15, f.value/1000));
    // Apply to dynamic price multipliers
    this._eM=Math.max(0.5,(this._eM||1)*0.9+f.multiplier*0.1);
    this.emit('futures',f);
  }

  // ── COMMUNITY RANDOM EVENTS (weekly) ─────────────────────────
  _weeklyCommEvents(){
    const day=this.s.time.day;
    // Roll 1–2 negative events
    const negPool=COMMUNITY_NEG.filter(e=>!e.cond||this.a.some(a=>e.cond(a)));
    const totalNegW=negPool.reduce((s,e)=>s+e.w,0);
    for(let i=0;i<2;i++){
      if(Math.random()>0.55)continue; // ~55% chance each slot fires
      let r=Math.random()*totalNegW,pick=null;
      for(const e of negPool){r-=e.w;if(r<=0){pick=e;break;}}
      if(!pick)continue;
      // Pick a random eligible agent
      const eligible=pick.cond?this.a.filter(a=>pick.cond(a)):this.a.filter(a=>!a.bankrupt);
      if(!eligible.length)continue;
      const agent=eligible[Math.floor(Math.random()*eligible.length)];
      pick.fx(agent,this.s);
      const bodyStr=pick.body(agent);
      agent.memory.push(`Day ${day}: ${pick.title} — ${bodyStr}`);
      if(agent.memory.length>8)agent.memory.shift();
      this._news('warn',pick.title,bodyStr);
    }
    // Roll 0–1 positive events
    const posPool=COMMUNITY_POS;
    const totalPosW=posPool.reduce((s,e)=>s+e.w,0);
    if(Math.random()<0.4){ // 40% chance a good thing happens
      let r=Math.random()*totalPosW,pick=null;
      for(const e of posPool){r-=e.w;if(r<=0){pick=e;break;}}
      if(pick){
        const needsAgent=['windfall','promotion'].includes(pick.id);
        const agent=needsAgent?this.a[Math.floor(Math.random()*this.a.length)]:null;
        pick.fx(agent||null,this.s);
        const bodyStr=pick.body(agent);
        this._news('good',pick.title,bodyStr);
      }
    }
  }

  // ── MAYOR TAX ADJUSTMENT (weekly, automatic) ──────────────────
  // Mayor raises tax when deficit > 20%, lowers when surplus > 40%.
  // Bounded 5%–25%. News alert when it changes.
  _mayorTaxAdjust(){
    const tr=this.s.treasury, m=this.s.metrics;
    const oldRate=tr.taxRate;
    let newRate=oldRate;
    if(tr.deficitPct>30&&m.economy<50)      newRate=Math.min(0.25,oldRate+0.01);
    else if(tr.deficitPct>20)               newRate=Math.min(0.25,oldRate+0.005);
    else if(tr.deficitPct<5&&tr.balance>2000)newRate=Math.max(0.05,oldRate-0.01);
    else if(tr.balance>3500)                newRate=Math.max(0.05,oldRate-0.005);
    newRate=Math.round(newRate*1000)/1000;
    if(newRate!==oldRate){
      tr.taxRate=newRate;
      const dir=newRate>oldRate?'raised':'lowered';
      this._news(newRate>oldRate?'warn':'good',
        `Mayor ${dir} tax to ${Math.round(newRate*100)}%`,
        `Deficit ${Math.round(tr.deficitPct)}% · Balance $${Math.round(tr.balance)} · Economy ${m.economy}`);
      this.emit('taxChange',{rate:newRate,prev:oldRate});
    }
  }

  // ── WEEKLY SUMMARY ────────────────────────────────────────────
  _buildWeeklySummary(){
    const t=this.s.time, m=this.s.metrics, tr=this.s.treasury;
    const f=this.s.futures;
    const mayor=this.a.find(a=>a.role==='mayor');
    const bankrupt=this.a.filter(a=>a.bankrupt).length;
    const employed=this.a.filter(a=>a.sal>0).length;
    this.s.weeklySummary={
      week:t.week, day:t.day,
      economy:m.economy, morale:m.morale, happiness:m.happiness,
      reputation:m.reputation, crime:m.crimeRate, tourists:m.tourists,
      balance:Math.round(tr.balance), deficit:Math.round(tr.deficitPct),
      taxRate:Math.round(tr.taxRate*100),
      futuresVal:Math.round(f.value), futuresPct:f.changePct,
      employed, bankrupt,
      mayor:mayor?.name||'—',
      crises:this.s.crises.map(c=>c.id.replace(/_/g,' ')).join(', ')||'none',
      events:[], // filled by community events that week
    };
  }

  // ══════════════════════════════════════════════════════════════
  // CRIMINAL SYSTEM
  // ══════════════════════════════════════════════════════════════
  // Thief lifecycle:
  //  1. Agent becomes thief when: socialCredit<25 AND cash<0 AND (homeless OR bankrupt)
  //  2. Thieves operate mainly at night (21:00–05:00), targeting buildings or agents
  //  3. Detection probability = 1 - (thieveryExp/100) * 0.8  (skill reduces risk)
  //  4. Police patrols road tiles; if same tile as thief → roll detection
  //  5. Caught → detained at police station, social credit −40, rep news
  //  6. Detained for 3–7 days, released with low credit
  //  7. If at church during Sunday service → redemption roll, credit restored
  //  8. Successful steals > 5 island-wide → crimeRate up, reputation down

  // Called every hourTick at night hours
  _thiefTick(){
    const t=this.s.time, h=Math.floor(t.hour);
    const isNight=h>=21||h<5;
    const inv=this.s.inv, m=this.s.metrics;

    this.a.forEach(a=>{
      // ── DETENTION countdown ──────────────────────────────────
      if(a.detained){
        a.detainedDays=(a.detainedDays||0);
        // Release check happens at 06:00
        if(h===6&&Math.random()<0.15){
          a.detained=false;
          a.state='sleeping';
          a.destination=a.houseCell;
          a.memory.push(`Day ${t.day}: Released from custody.`);
          if(a.memory.length>8)a.memory.shift();
          this._news('info',`${a.name} released`,`Served time. Social credit: ${a.socialCredit}.`);
        }
        return; // detained agents don't move/act
      }

      // ── THIEF ACTIVATION ───────────────────────────────────
      if(!a.isThief&&!a.detained){
        const creditThreshold=25;
        const shouldTurn=
          (a.socialCredit||60)<creditThreshold &&
          a.cash<0 &&
          (a.bankrupt||a.role==='wanderer'||a.role==='housewife') &&
          Math.random()<0.08; // 8% chance per hour when conditions met
        if(shouldTurn){
          a.isThief=true;
          a.role='wanderer'; a.wp=null; a.sal=0;
          a.memory.push(`Day ${t.day}: Turned to theft. Nothing left to lose.`);
          if(a.memory.length>8)a.memory.shift();
          this._news('warn',`${a.name} turned thief`,`Low credit (${a.socialCredit||60}), broke, desperate.`);
        }
      }

      // ── THIEF BEHAVIOUR ────────────────────────────────────
      if(!a.isThief)return;

      // Thieves sleep normally, only operate at night or quiet daytime
      if(!isNight&&Math.random()>0.05)return; // 5% chance daytime opportunistic steal

      // Choose a target: building or agent
      if(Math.random()<0.6){
        this._thiefRobBuilding(a,t);
      } else {
        this._thiefRobAgent(a,m,t);
      }
    });
  }

  _thiefTick(){
    const t=this.s.time, h=Math.floor(t.hour);
    const isNight=h>=21||h<6;
    const isDaySleep=h>=6&&h<18; // thieves rest during day
    const inv=this.s.inv, m=this.s.metrics;

    this.a.forEach(a=>{
      // ── DETENTION countdown ──────────────────────────────────
      if(a.detained){
        // Fix 4: Escape attempt — probability based on thievery experience
        // Only active thieves with exp > 40 attempt escape; harder to escape well-guarded cells
        const isThiefDetained=a.isThief||a.thieveryExp>0;
        if(isThiefDetained&&isNight){
          const escapeProb=Math.max(0, (a.thieveryExp||0)/100*0.12); // 0–12%/hour at night
          if(Math.random()<escapeProb){
            a.detained=false;
            a.thieveryExp=Math.min(100,(a.thieveryExp||0)+3); // escape = skill boost
            const sleepCell=this._thiefSleepCell(a);
            a.state='sleeping'; a.destination=sleepCell;
            a.path=bfsPath(a.pos.col,a.pos.row,sleepCell.col,sleepCell.row); a.pathStep=0;
            a.memory.push(`Day ${t.day}: Escaped from custody at night. They'll never find me near the dock.`);
            if(a.memory.length>8)a.memory.shift();
            // Police lose reputation — escape embarrasses them
            this.s.metrics.reputation=Math.max(0,this.s.metrics.reputation-2);
            this.s.metrics.crimeRate=Math.min(100,this.s.metrics.crimeRate+3);
            const police=this.a.find(x=>x.role==='police');
            if(police){police.mood=Math.max(-1,police.mood-0.2);police.memory.push(`Day ${t.day}: ${a.name} escaped custody!`);}
            this._news('warn',`${a.name} escaped!`,`Broke out overnight. Thievery exp +3. Police reputation −2.`);
            return;
          }
        }
        // Normal release at 06:00
        if(h===6&&Math.random()<0.15){
          a.detained=false;
          a.state='sleeping';
          a.destination=this._thiefSleepCell(a);
          a.memory.push(`Day ${t.day}: Released from custody.`);
          if(a.memory.length>8)a.memory.shift();
          this._news('info',`${a.name} released`,`Served time. Credit: ${a.socialCredit}.`);
        }
        return;
      }

      // ── SQUATTER: find a vacancy to sleep during the day ─────
      if(a.isThief&&isDaySleep&&(a.state==='stealing'||a.state==='wandering'||!a.squatterCell)){
        const cell=this._thiefSleepCell(a);
        a.squatterCell=cell;
        a.state='sleeping';
        if(a.destination?.col!==cell.col||a.destination?.row!==cell.row){
          a.destination=cell;
          a.path=bfsPath(a.pos.col,a.pos.row,cell.col,cell.row);
          a.pathStep=0;
        }
        return;
      }

      // ── THIEF ACTIVATION (organic — broke wanderers) ─────────
      if(!a.isThief&&!a.detained){
        const shouldTurn=
          (a.socialCredit||60)<25 && a.cash<0 &&
          (a.bankrupt||a.role==='wanderer'||a.role==='housewife') &&
          Math.random()<0.08;
        if(shouldTurn){
          a.isThief=true; a.role='wanderer'; a.wp=null; a.sal=0;
          a.noRent=true; a.noTax=true; a.squatter=true;
          a.memory.push(`Day ${t.day}: Turned to theft. Nothing left to lose.`);
          if(a.memory.length>8)a.memory.shift();
          this._news('warn',`${a.name} turned thief`,`Credit ${a.socialCredit||60}, broke, desperate.`);
        }
      }

      if(!a.isThief)return;
      if(!isNight)return; // only operate at night

      a.state='stealing';

      // ── CHOOSE TARGET ────────────────────────────────────────
      // Experienced thieves prefer high-value buildings. Less exp = random.
      const roll=Math.random();
      if(roll<0.45){
        this._thiefRobBuilding(a,t);
      } else if(roll<0.75){
        this._thiefRobResident(a,t);
      } else {
        this._thiefRobTreasury(a,t);
      }
    });
  }

  // Find a vacant house cell or any unoccupied house cell for squatting
  _thiefSleepCell(thief){
    // Fix 3: Zack always prefers houses CLOSEST TO DOCK (row 7, highest col = nearest col 7)
    // Dock is at col:7,row:7 — so H15(col6,row7) and H13-H15 area are preferred
    const agentPositions=new Set(
      this.a.filter(a=>a.id!==thief.id&&!a.detained)
             .map(a=>`${a.pos.col},${a.pos.row}`)
    );
    const houseList=Object.values(HOUSES)
      .map(h=>({
        col:h.col, row:h.row,
        officiallyVacant:h.residents.length===0||(h.residents.length===1&&h.residents[0]===thief.id),
        agentPresent:agentPositions.has(`${h.col},${h.row}`),
        dockDist:Math.abs(h.col-7)+Math.abs(h.row-7), // distance from dock (col7,row7)
      }))
      .filter(h=>!h.agentPresent) // must be empty right now
      .sort((a,b)=>{
        // Primary: prefer south row (row 7 = closer to dock)
        const rowA=a.row===7?0:5;
        const rowB=b.row===7?0:5;
        // Secondary: closest to dock by column
        return (rowA+a.dockDist+(a.officiallyVacant?0:8))-(rowB+b.dockDist+(b.officiallyVacant?0:8));
      });
    if(houseList.length) return{col:houseList[0].col,row:houseList[0].row};
    return{col:6,row:6}; // fallback road near dock
  }

  _thiefRobBuilding(thief, t){
    const m=this.s.metrics, inv=this.s.inv, b=this.s.bldg;
    const allBuildings=[];
    for(let r=0;r<8;r++)for(let c=0;c<8;c++){
      const ct=MAP[r][c];
      if(ct&&ct!=='road'&&ct!=='house'&&ct!=='dock')allBuildings.push({col:c,row:r,type:ct});
    }
    const agentPos=new Set(this.a.filter(a=>a.id!==thief.id&&!a.detained).map(a=>`${a.pos.col},${a.pos.row}`));
    const empty=allBuildings.filter(bl=>!agentPos.has(`${bl.col},${bl.row}`));
    if(!empty.length)return;

    // Guardian experience per building — even when absent, experienced guardians
    // leave better locks/alarms. Police exp most powerful, bank second.
    const guardianExp=(type)=>{
      const guardRoles={bank:'banker',police:'police',hospital:'doctor',
                        factory:'factory_mgr',shop:'shopkeeper',airport:'airport_master',
                        townhall:'mayor',museum:'mayor',hotel:'landlord',church:'priest'};
      const role=guardRoles[type];
      const guardian=role?this.a.find(a=>a.role===role):null;
      return guardian?(guardian.experience?.[role]||0):0;
    };

    // Personality vigilance: strict/order/law personalities = harder to steal from
    const guardianVigilance=(type)=>{
      const guardRoles={bank:'banker',police:'police',hospital:'doctor',factory:'factory_mgr',shop:'shopkeeper'};
      const role=guardRoles[type];
      const guardian=role?this.a.find(a=>a.role===role):null;
      if(!guardian)return 0;
      const per=guardian.per.toLowerCase();
      return [/strict/,/idealist/,/cautious/,/law/,/order/,/justice/,/risk-averse/]
        .filter(rx=>rx.test(per)).length * 5; // 0–35 pts
    };

    // Weight — experience-gated: Zack won't bother with bank until exp > 50
    const baseWeights={bank:1,hotel:3,museum:2,shop:4,factory:3,airport:2,upkeep:1,church:1,park:1,hospital:2,police:0.3,townhall:2};
    const weights=empty.map(bl=>({
      ...bl,
      w:(baseWeights[bl.type]||1)*(
          bl.type==='bank'?(thief.thieveryExp>70?3:thief.thieveryExp>50?1:0.2):
          bl.type==='police'?(thief.thieveryExp>80?1:0.1):1
        )
    }));
    const total=weights.reduce((s,b)=>s+b.w,0);
    let rv=Math.random()*total,target=weights[0];
    for(const bl of weights){rv-=bl.w;if(rv<=0){target=bl;break;}}

    const tKey=`${target.col},${target.row}`;
    if(thief._lastTarget!==tKey){
      thief.path=bfsPath(thief.pos.col,thief.pos.row,target.col,target.row);
      thief.pathStep=0; thief._lastTarget=tKey;
    }
    thief.destination={col:target.col,row:target.row};
    if(Math.abs(thief.pos.col-target.col)+Math.abs(thief.pos.row-target.row)>1)return;
    if(agentPos.has(tKey)){thief.path=[];thief._lastTarget=null;return;}

    // ── DETECTION: thieveryExp vs guardian experience + personality vigilance ──
    // Base risk purely from thief skill (higher exp = lower base risk)
    const thiefSkill=thief.thieveryExp/100; // 0–1
    const gExp=guardianExp(target.type);
    const gVig=guardianVigilance(target.type);
    // Guardian security quality: experience × 0.003 (up to 0.30) + vigilance/100 (up to 0.35)
    const guardSecurity=Math.min(0.65, gExp*0.003 + gVig/100);
    // Building hardness modifier
    const hardness={bank:0.30,police:0.35,hospital:0.10,factory:0.08,
                    airport:0.10,townhall:0.12,museum:0.05,hotel:0.05,
                    shop:0.02,church:0.01,park:0.00,upkeep:0.00}[target.type]||0.05;
    // detectProb = base(1-thiefSkill×0.75) + guardSecurity + hardness
    const detectProb=Math.max(0.03,Math.min(0.97,
      (1-thiefSkill*0.75)*0.55 + guardSecurity + hardness
    ));
    const detected=Math.random()<detectProb;

    if(!detected){
      let cashGain=0, newsDetail='';
      const bldgState=b[target.type];

      switch(target.type){
        case 'bank':{
          // Loot scales with actual treasury balance — richer island = bigger heist
          const maxLoot=Math.min(this.s.treasury.balance*0.15, 300);
          const loot=Math.round(maxLoot*(0.4+thiefSkill*0.6)*(0.7+Math.random()*0.5));
          this.s.treasury.balance=Math.max(0,this.s.treasury.balance-loot);
          cashGain=loot; newsDetail=`$${loot} from bank vault (treasury was $${Math.round(this.s.treasury.balance+loot)})`;
          if(bldgState){bldgState.vandalism=(bldgState.vandalism||0)+3;bldgState.condition=Math.max(0,bldgState.condition-10);}
          this._news('warn','Bank break-in!',`$${loot} stolen. Ken's security failed. Treasury hit.`);
          break;}
        case 'shop':{
          // Loot scales with current stock value
          const foodSteal=Math.min(inv.food?.qty||0,Math.round((2+thiefSkill*8)));
          const alcSteal=Math.min(inv.alcohol?.qty||0,Math.round(thiefSkill*3));
          if(inv.food)inv.food.qty=Math.max(0,inv.food.qty-foodSteal);
          if(inv.alcohol)inv.alcohol.qty=Math.max(0,inv.alcohol.qty-alcSteal);
          cashGain=Math.round(foodSteal*(inv.food?.sell||5)+alcSteal*(inv.alcohol?.sell||14));
          if(foodSteal>0)(thief.stolenGoods=thief.stolenGoods||[]).push({type:'food',qty:foodSteal,val:inv.food?.sell||5});
          if(alcSteal>0)(thief.stolenGoods=thief.stolenGoods||[]).push({type:'alcohol',qty:alcSteal,val:inv.alcohol?.sell||14});
          newsDetail=`${foodSteal}u food + ${alcSteal}u alcohol (worth $${cashGain})`;
          if(bldgState){bldgState.vandalism=(bldgState.vandalism||0)+1;bldgState.condition=Math.max(0,bldgState.condition-4);}
          break;}
        case 'factory':{
          const matSteal=Math.min(inv.rawMat?.qty||0,Math.round(3+thiefSkill*15));
          if(inv.rawMat)inv.rawMat.qty=Math.max(0,inv.rawMat.qty-matSteal);
          cashGain=Math.round(matSteal*(inv.rawMat?.buy||10)*0.6);
          if(matSteal>0)(thief.stolenGoods=thief.stolenGoods||[]).push({type:'rawMat',qty:matSteal,val:inv.rawMat?.buy||10});
          if(bldgState){bldgState.vandalism=(bldgState.vandalism||0)+2;bldgState.condition=Math.max(0,bldgState.condition-6);bldgState.outputRate=Math.max(0.3,bldgState.outputRate-0.1);}
          newsDetail=`${matSteal}u raw materials (output −10%)`;
          break;}
        case 'hospital':{
          const medSteal=Math.min(inv.medicine?.qty||0,Math.round(1+thiefSkill*4));
          if(inv.medicine)inv.medicine.qty=Math.max(0,inv.medicine.qty-medSteal);
          cashGain=Math.round(medSteal*(inv.medicine?.sell||20)*0.5);
          if(medSteal>0)(thief.stolenGoods=thief.stolenGoods||[]).push({type:'medicine',qty:medSteal,val:inv.medicine?.sell||20});
          if(bldgState){bldgState.vandalism=(bldgState.vandalism||0)+2;bldgState.condition=Math.max(0,bldgState.condition-5);}
          newsDetail=`${medSteal}u medicine (worth $${cashGain})`;
          break;}
        default:{
          // Petty cash — scales with treasury balance as proxy for how much cash these institutions hold
          const basePct={museum:0.03,hotel:0.04,airport:0.025,townhall:0.03,
                         church:0.01,park:0.005,upkeep:0.005,police:0.01}[target.type]||0.02;
          const loot=Math.round(Math.max(5, this.s.treasury.balance*basePct*thiefSkill*(0.7+Math.random()*0.5)));
          this.s.treasury.balance=Math.max(0,this.s.treasury.balance-loot);
          cashGain=loot; newsDetail=`$${loot} from ${target.type} register`;
          if(bldgState){bldgState.vandalism=(bldgState.vandalism||0)+1;bldgState.condition=Math.max(0,bldgState.condition-3);}
          break;}
      }

      thief.cash+=Math.round(cashGain);
      thief.stolenCash=(thief.stolenCash||0)+Math.round(cashGain);
      thief.thieveryExp=Math.min(100,thief.thieveryExp+2);
      thief.successfulSteals=(thief.successfulSteals||0)+1;
      thief._lastTarget=null;
      thief.memory.push(`Day ${t.day}: ${target.type} — ${newsDetail}. Guard lvl ${Math.round(guardSecurity*100)}.`);
      if(thief.memory.length>8)thief.memory.shift();
      this._thiefCrimeImpact(thief,m,'building');
    }else{
      const bldgState=b[target.type];
      if(bldgState){bldgState.vandalism=(bldgState.vandalism||0)+1;bldgState.condition=Math.max(0,bldgState.condition-2);}
      this._arrestThief(thief,t,`caught in empty ${target.type} (guard lvl ${Math.round((guardSecurity+hardness)*100)}%)`);
    }
  }

  _thiefRobResident(thief, t){
    const b=this.s.bldg;
    const agentSnap=this.a.filter(a=>a.id!==thief.id&&!a.detained).map(a=>({
      id:a.id,col:a.pos.col,row:a.pos.row,
      cash:a.cash,sav:a.sav||0,state:a.state,houseId:a.houseId,
      per:a.per||'',experience:a.experience||{},
    }));

    // Target: sleeping alone, rich (cash+sav is the score)
    const victims=agentSnap
      .filter(a=>a.state==='sleeping'&&(a.cash+a.sav)>5)
      .filter(a=>agentSnap.filter(b=>b.col===a.col&&b.row===a.row&&b.id!==a.id).length===0)
      .sort((x,y)=>(y.cash+y.sav)-(x.cash+x.sav)); // richest total first

    if(!victims.length)return;
    const vSnap=victims[0];
    const victim=this.a.find(a=>a.id===vSnap.id);
    if(!victim)return;

    const vHouse=HOUSES[victim.houseId];
    if(!vHouse)return;
    const tKey=`${vHouse.col},${vHouse.row}`;
    if(thief._lastTarget!==tKey){
      thief.path=bfsPath(thief.pos.col,thief.pos.row,vHouse.col,vHouse.row);
      thief.pathStep=0; thief._lastTarget=tKey;
    }
    thief.destination={col:vHouse.col,row:vHouse.row};
    if(Math.abs(thief.pos.col-vHouse.col)+Math.abs(thief.pos.row-vHouse.row)>2)return;
    const houseNow=agentSnap.filter(a=>a.col===vHouse.col&&a.row===vHouse.row&&a.id!==victim.id&&a.id!==thief.id);
    if(houseNow.length>0){thief.path=[];thief._lastTarget=null;return;}

    // ── DETECTION: thieveryExp vs victim personality vigilance + role experience ──
    const per=victim.per.toLowerCase();
    // Vigilant personality traits increase detection
    const vigilance=[/strict/,/cautious/,/idealist/,/risk-averse/,/alert/,/practical/,/truth/]
      .filter(rx=>rx.test(per)).length * 6; // 0–42 pts
    // Role experience as a proxy for security awareness
    const roleExp=Math.max(...Object.values(victim.experience||{0:0}));
    const expBonus=Math.min(20, roleExp*0.4); // up to 20 pts for 50 days exp
    // Thief skill
    const thiefSkill=thief.thieveryExp/100;
    // detectProb: base reduced by thiefSkill, raised by victim awareness
    const detectProb=Math.max(0.03,Math.min(0.95,
      (0.60-thiefSkill*0.55) + (vigilance+expBonus)/100
    ));
    const detected=Math.random()<detectProb;

    if(!detected){
      // ── LOOT: proportion of victim's actual cash + portion of savings ──
      // Cash at home: 30–50% of cash (scales with thief skill)
      const cashPct=0.25+thiefSkill*0.25;
      const cashSteal=Math.round(Math.min(victim.cash, Math.max(5, victim.cash*cashPct)));
      // Savings raid: experienced thieves find the stash (0–20% of sav)
      const savPct=Math.max(0, thiefSkill*0.20-0.05); // only if exp > 25
      const savSteal=Math.round(Math.min(victim.sav||0, (victim.sav||0)*savPct));
      const totalStolen=cashSteal+savSteal;

      victim.cash=Math.max(0,victim.cash-cashSteal);
      if(savSteal>0)victim.sav=Math.max(0,(victim.sav||0)-savSteal);
      thief.cash+=totalStolen;
      thief.stolenCash=(thief.stolenCash||0)+totalStolen;
      thief.thieveryExp=Math.min(100,thief.thieveryExp+2);
      thief.successfulSteals=(thief.successfulSteals||0)+1;
      thief._lastTarget=null;

      const hState=b.houses?.[victim.houseId];
      if(hState){hState.vandalism=(hState.vandalism||0)+1;hState.condition=Math.max(0,hState.condition-4);}

      const savNote=savSteal>0?` + $${savSteal} savings`:'';
      thief.memory.push(`Day ${t.day}: ${victim.name}'s house ($${cashSteal} cash${savNote}). Awareness: ${Math.round(detectProb*100)}%.`);
      victim.memory.push(`Day ${t.day}: Woke up $${totalStolen} shorter. Someone knew where I kept it.`);
      if(thief.memory.length>8)thief.memory.shift();
      if(victim.memory.length>8)victim.memory.shift();
      this._thiefCrimeImpact(thief,this.s.metrics,'resident');
    }else{
      victim.mood=Math.max(-1,victim.mood-0.15);
      victim.memory.push(`Day ${t.day}: Woke up — someone was in my house! Called for help.`);
      if(victim.memory.length>8)victim.memory.shift();
      this._arrestThief(thief,t,`caught by ${victim.name} (vigilance ${Math.round((vigilance+expBonus))}pts)`);
    }
  }

  _thiefRobTreasury(thief, t){
    const m=this.s.metrics;
    const target={col:3,row:3}; // town hall
    const agentPos=new Set(this.a.filter(a=>a.id!==thief.id&&!a.detained).map(a=>`${a.pos.col},${a.pos.row}`));
    if(agentPos.has(`${target.col},${target.row}`))return;

    const tKey=`${target.col},${target.row}`;
    if(thief._lastTarget!==tKey){
      thief.path=bfsPath(thief.pos.col,thief.pos.row,target.col,target.row);
      thief.pathStep=0; thief._lastTarget=tKey;
    }
    thief.destination=target;
    if(Math.abs(thief.pos.col-target.col)+Math.abs(thief.pos.row-target.row)>1)return;
    if(agentPos.has(tKey)){thief.path=[];thief._lastTarget=null;return;}

    // ── DETECTION: Maya's mayoral experience + personality vigilance ──
    const maya=this.a.find(a=>a.role==='mayor');
    const mayaExp=maya?(maya.experience?.mayor||0):0;
    const mayaPer=(maya?.per||'').toLowerCase();
